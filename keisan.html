      <div class="w-steps" id="csSteps"></div>
    </div>
    <div class="big-point rose">CLが下がると Css は上がる（反比例）。<b class="kr">腎機能低下で減量しないと、濃度が危険域へ</b>。</div>
  </section>

  <hr class="hr">

  <!-- D PK triangle -->
  <section>
    <div class="step-no"><span class="dot">D</span>まとめ</div>
    <h2>Vd・CL・t½・AUC の関係</h2>
    <p class="lead-line">これでPKの主役がそろいました。<b class="kp">Vdは負荷量</b>、<b class="kb">CLは維持量</b>を決める——これが一番の要点です。</p>
    <div class="pktri">
      <div class="pkcard vd"><span class="lhs">負荷量</span><span class="rhs">＝ <b>Vd</b> × 目標濃度（器を満たす）</span></div>
      <div class="pkcard cl"><span class="lhs">維持量</span><span class="rhs">＝ <b>CL</b> × 目標濃度（抜けるぶんを補う）</span></div>
      <div class="pkcard t"><span class="lhs">半減期</span><span class="rhs">t½ ＝ 0.693 × <b>Vd</b> ÷ <b>CL</b></span></div>
      <div class="pkcard a"><span class="lhs">露出</span><span class="rhs">AUC ＝ 投与量 ÷ <b>CL</b></span></div>
    </div>
    <div class="big-point">いちばんの要点：<b class="kp">Vd → 負荷量（最初の一発）</b>、<b class="kb">CL → 維持量（保ち続ける）</b>。</div>
  </section>

  <hr class="hr">

  <!-- E drill -->
  <section>
    <div class="step-no"><span class="dot" style="background:var(--mint)">練</span>手を動かして覚える</div>
    <h2>クリアランスドリル</h2>
    <p class="lead-line">あとは反復。問題を見て、答えを選んでください。</p>
    <div class="quiz">
      <div class="q" id="drillQ"></div>
      <div style="text-align:center;margin:6px 0;font-size:.88rem;color:var(--ink-soft);" id="drillHint"></div>

      <div class="score" id="drillScore">正解 0 / 0</div>
      <button class="next" id="drillNext" style="display:none;">つぎの問題 ›</button>
    </div>
  </section>

  <hr class="hr">

  <!-- F つまずき -->
  <section>
    <div class="step-no"><span class="dot">F</span>現場のつまずき</div>
    <h2>ここで間違えがち</h2>
    <div class="pit"><span class="tag">注意①</span><p style="margin:0"><b>負荷量と維持量を取り違える。</b><br><span class="soft">最初の一発＝Vd×濃度（負荷）、保つ量＝CL×濃度（維持）。</span></p></div>
    <div class="pit"><span class="tag">注意②</span><p style="margin:0"><b>CL低下時に減量しない。</b><br><span class="soft">Css＝速度÷CL。CLが落ちれば同じ速度でも濃度は上がる＝蓄積。</span></p></div>
    <div class="pit"><span class="tag">注意③</span><p style="margin:0"><b>単位（L/h と mL/min）混同。</b><br><span class="soft">mL/min は ÷1000×60 で L/h に。Css計算は単位をそろえて。</span></p></div>
  </section>

  <p class="closing">
    <span class="leaf">🦎</span><br>
    CL ＝ <b>1時間にきれいにする血の量</b>。大きい＝速く抜ける。<br>
    <b>維持量 ＝ CL × Css</b>、<b>Css ＝ 速度 ÷ CL</b>、<b>AUC ＝ 量 ÷ CL</b>。<br>
    <b>Vdは負荷量、CLは維持量</b>。腎機能↓でCL↓＝減量。
  </p>

<script>

  function fmt(n){ if(!isFinite(n))return '0'; let r=Math.round(n*1000)/1000; return r.toLocaleString('ja-JP',{maximumFractionDigits:3}); }
  function goPage(n){

    document.getElementById('home').hidden=false;

  }


/* ===== theme inits ===== */
function init_percent(){

  function goPage(n){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    const pg=document.getElementById('page'+n); if(pg) pg.classList.add('active');
    document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on', t.dataset.p===String(n)));
    window.scrollTo(0,0);
  }
  function fmt(n){ if(!isFinite(n))return '0'; let r=Math.round(n*1000)/1000; return r.toLocaleString('ja-JP',{maximumFractionDigits:3}); }
  function captionFor(v){
    const m={0:'なんにもなし。ゼロ。',1:'たった1マス（＝1%）。',10:'1列ぶん（10%）。',20:'2列ぶん（20%）。',25:'4分の1だね。',
      33:'だいたい3分の1。',40:'もうすぐ半分。',50:'ちょうど半分！（5列）',60:'半分より少し多い。',67:'だいたい3分の2。',
      75:'4分の3。あと少し。',80:'のこり2列で全部。',90:'あと1列で全部！',100:'まるごと全部！'};
    return m[v]||`100マスのうち ${v}マス。`;
  }

  /* ===== 2: tap grid ===== */
  (function(){
    const grid=document.getElementById('s2grid'), v=document.getElementById('s2v'), cap=document.getElementById('s2cap'), cells=[];
    for(let i=0;i<100;i++){ const d=document.createElement('div'); d.className='gcell tap'; grid.appendChild(d); cells.push(d); }
    function count(){ const n=cells.filter(c=>c.classList.contains('on')).length; v.textContent=n; cap.textContent= n===0?'マスをタップしてぬってみよう':captionFor(n); }
    let painting=false, paintOn=true;
    cells.forEach(c=>{
      c.addEventListener('pointerdown',e=>{ painting=true; paintOn=!c.classList.contains('on'); c.classList.toggle('on',paintOn); count(); });
      c.addEventListener('pointerenter',()=>{ if(painting){ c.classList.toggle('on',paintOn); count(); } });
    });
    window.addEventListener('pointerup',()=>painting=false);
    document.getElementById('s2clear').onclick=()=>{cells.forEach(c=>c.classList.remove('on'));count();};
    document.getElementById('s2fill').onclick=()=>{cells.forEach(c=>c.classList.add('on'));count();};
    count();
  })();

  /* ===== 3: multi-rep ===== */
  (function(){
    const grid=document.getElementById('s3grid'), cells=[];
    for(let i=0;i<100;i++){ const d=document.createElement('div'); d.className='gcell'; grid.appendChild(d); cells.push(d); }
    const v=document.getElementById('s3v'),cap=document.getElementById('s3cap'),pie=document.getElementById('s3pie'),pin=document.getElementById('s3pin'),
      bar=document.getElementById('s3bar'),nlf=document.getElementById('s3nlf'),nld=document.getElementById('s3nld'),s=document.getElementById('s3s');
    function r(val){ val=+val; cells.forEach((c,i)=>c.classList.toggle('on',i<val)); v.textContent=val; cap.textContent=captionFor(val);
      const deg=val*3.6; pie.style.background=`conic-gradient(var(--persimmon) ${deg}deg, var(--grid-empty) ${deg}deg)`; pin.textContent=val+'%';
      bar.style.width=val+'%'; nlf.style.width=val+'%'; nld.style.left=val+'%'; }
    s.oninput=e=>r(e.target.value);
    document.querySelectorAll('#s3s ~ .qbs .qb').forEach(b=>b.onclick=()=>{s.value=b.dataset.v;r(b.dataset.v);});
    r(40);
  })();

  /* ===== 4: landmark gallery ===== */
  (function(){
    const data=[
      {p:0,emo:'🌑',a:'なんにもなし'},{p:1,emo:'🔹',a:'ほんの少し（1マス）'},
      {p:10,emo:'🍫',a:'板チョコ1かけ'},{p:25,emo:'🍕',a:'ピザ4切れの1切れ'},
      {p:50,emo:'🌓',a:'ぴったり半分'},{p:75,emo:'🌖',a:'4分の3'},
      {p:100,emo:'🌕',a:'まるごと全部'},
    ];
    const g=document.getElementById('s4gallery');
    data.forEach(d=>{
      const div=document.createElement('div'); div.className='lm';
      let mini='<div class="mini">'; for(let i=0;i<100;i++) mini+=`<div class="${i<d.p?'on':''}"></div>`; mini+='</div>';
      div.innerHTML=`${mini}<div class="pct">${d.p}%</div><div><span class="emo">${d.emo}</span> <span class="anchor">${d.a}</span></div>`;
      g.appendChild(div);
    });
    // 200% wide card with two grids
    const wide=document.createElement('div'); wide.className='lm wide';
    let two='<div class="twomini">'; for(let k=0;k<2;k++){ two+='<div class="mini">'; for(let i=0;i<100;i++) two+='<div class="on"></div>'; two+='</div>'; } two+='</div>';
    wide.innerHTML=`${two}<div class="pct">200%</div><div><span class="emo">🍕🍕</span> <span class="anchor">まるごと2つ分（100%を超えてもOK）</span></div>`;
    g.appendChild(wide);
  })();

  /* ===== 5: of-what ===== */
  (function(){
    const wholes=[
      {e:'🍕',name:'ピザ8切れ',total:8,unit:'切れ',dec:true},
      {e:'👥',name:'200人',total:200,unit:'人'},
      {e:'💴',name:'1000円',total:1000,unit:'円'},
      {e:'💊',name:'薬30mg',total:30,unit:'mg'},
    ];
    const box=document.getElementById('s5cards'), s=document.getElementById('s5s'), v=document.getElementById('s5v');
    wholes.forEach((w,i)=>{ const c=document.createElement('div'); c.className='wcard'; c.id='s5c'+i;
      c.innerHTML=`<div class="top"><span class="e">${w.e}</span>${w.name}</div><div class="res" id="s5r${i}">0</div><div class="wtrack"><div class="wfill" id="s5f${i}"></div></div>`;
      box.appendChild(c); });
    function r(p){ p=+p; v.textContent=p;
      wholes.forEach((w,i)=>{ let val=w.total*p/100; val= w.dec? Math.round(val*10)/10 : Math.round(val*100)/100;
        document.getElementById('s5r'+i).textContent=fmt(val)+w.unit; document.getElementById('s5f'+i).style.width=p+'%'; }); }
    s.oninput=e=>r(e.target.value);
    document.querySelectorAll('#s5s ~ .qbs .qb').forEach(b=>b.onclick=()=>{s.value=b.dataset.v;r(b.dataset.v);});
    r(50);
  })();

  /* ===== 6: per-square worth ===== */
  (function(){
    const grid=document.getElementById('s6grid'), cells=[];
    for(let i=0;i<100;i++){ const d=document.createElement('div'); d.className='wg'; grid.appendChild(d); cells.push(d); }
    const nIn=document.getElementById('s6n'), s=document.getElementById('s6s'),

    const x0=28, y0=148, plotW=280, plotH=126;

    const N=26;
    for(let i=1;i<=N;i++){ const t=i/N; const x=peakX+t*(x0+plotW-peakX); const c=peakFrac*Math.exp(-k*t*3.2); const y=y0-c*plotH; line+=' L '+x.toFixed(1)+' '+y.toFixed(1); }

function init_nonlinear(){

  function goPage(n){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    const pg=document.getElementById('page'+n); if(pg) pg.classList.add('active');
    document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on', t.dataset.p===String(n)));
    window.scrollTo(0,0);
  }
  function fmt(n){ if(!isFinite(n))return '0'; let r=Math.round(n*10)/10; return r.toLocaleString('ja-JP',{maximumFractionDigits:1}); }

  /* nonlinear shape: conc = a*dose/(1 - dose/cap) style blow-up, normalized for the figure */
  function nonlinConc(doseFrac){
    // doseFrac 0..1 ; gentle then steep near 1
    const knee=0.6;
    if(doseFrac<=knee) return doseFrac; // linear-ish below knee
    const over=(doseFrac-knee)/(1-knee); // 0..1
    return knee + over*(1-knee) + over*over*0.9; // accelerate
  }

  /* P1-3: compare curves */
  (function(){
    const s=document.getElementById('nlDose'),linV=document.getElementById('nlLinV'),nonV=document.getElementById('nlNonV'),steps=document.getElementById('nlSteps'),
      pl=document.getElementById('nlLinear'),pc=document.getElementById('nlCurve'),dotL=document.getElementById('nlDotL'),dotN=document.getElementById('nlDotN');
    const x0=34, y0=170, W=272, H=150;
    function px(f){ return x0 + f*W; }
    function pyL(f){ return y0 - f*H*0.6; }      // linear scaled
    function pyN(f){ return y0 - nonlinConc(f)*H*0.46; } // nonlinear scaled
    // build static paths
    let lin='M '+x0+' '+y0, non='M '+x0+' '+y0;
    for(let i=1;i<=50;i++){ const f=i/50; lin+=' L '+px(f).toFixed(1)+' '+pyL(f).toFixed(1); non+=' L '+px(f).toFixed(1)+' '+pyN(f).toFixed(1); }
    pl.setAttribute('d',lin); pc.setAttribute('d',non);
    function r(){ const f=(parseFloat(s.value)||0)/100;
      const lv=f*100, nv=nonlinConc(f)/1*100*0.78; // scale nonlinear readout
      linV.textContent=fmt(f*60); nonV.textContent=fmt(nonlinConc(f)*60*0.78);
      dotL.setAttribute('cx',px(f)); dotL.setAttribute('cy',pyL(f));
      dotN.setAttribute('cx',px(f)); dotN.setAttribute('cy',pyN(f));
      const ratio = nonlinConc(f)/Math.max(0.001,f);
      steps.innerHTML = f>0.62 ? `飽和域：非線形は線形の約 <b>${fmt(ratio)}倍</b>に。少しの増量で急上昇。` : `この範囲では、線形とほぼ同じ動き。`;
    }
    s.oninput=r; r();
  })();

  /* P2-B: predict gap */
  (function(){
