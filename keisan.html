<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiriのやさしい教科書</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#F08A4B">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Kiriのやさしい教科書">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ---- style: percent ---- */

  :root{
    --paper:#FCF5EA; --card:#FFFDF8; --ink:#322E36; --ink-soft:#6E6672;
    --line:#ECE0CE; --grid-empty:#F1E6D4;
    --persimmon:#F08A4B; --persimmon-deep:#DE6E2F; --persimmon-soft:#FFE3CE;
    --sky:#4FA3C7; --sky-deep:#367C9C; --mint:#6FB98A; --mint-deep:#3E9A63;
    --plum:#A87BB5; --plum-deep:#7E5A8C; --gold:#E0A93B;
    --shadow:0 8px 24px rgba(120,80,40,.10);
  }
  *{box-sizing:border-box;}
  @media (prefers-reduced-motion: reduce){ *{transition:none!important; animation:none!important;} }
  html{ -webkit-text-size-adjust:100%; }
  body{ margin:0; color:var(--ink);
    background:radial-gradient(130% 70% at 50% -6%, #FFF8EE 0%, var(--paper) 48%) fixed;
    font-family:"Zen Kaku Gothic New","Hiragino Maru Gothic ProN","Hiragino Sans","Yu Gothic",sans-serif;
    line-height:1.92; letter-spacing:.01em; }
  .wrap{ max-width:680px; margin:0 auto; padding:24px 18px 90px; }

  /* hero */
  .hero{ text-align:center; padding:14px 4px 6px; }
  .eyebrow{ display:inline-block; font-family:"Zen Maru Gothic"; font-weight:700; font-size:.78rem; letter-spacing:.14em;
    color:var(--persimmon-deep); background:var(--persimmon-soft); padding:5px 14px; border-radius:999px; margin-bottom:14px; }
  h1{ font-family:"Zen Maru Gothic"; font-weight:900; font-size:clamp(2rem,8vw,2.8rem); line-height:1.18; margin:.1em 0 .3em; }
  h1 .hl{ color:var(--persimmon); }
  .lead{ color:var(--ink-soft); font-size:1.04rem; margin:0 auto; max-width:30ch; }

  /* section scaffolding */
  section{ margin:52px 0; }
  .step-no{ display:inline-flex; align-items:center; gap:8px; font-family:"Zen Maru Gothic"; font-weight:900;
    color:var(--persimmon-deep); font-size:.82rem; letter-spacing:.08em; margin-bottom:2px; }
  .step-no .dot{ width:24px; height:24px; border-radius:50%; background:var(--persimmon); color:#fff; display:grid; place-items:center; font-size:.85rem; }
  h2{ font-family:"Zen Maru Gothic"; font-weight:900; font-size:clamp(1.45rem,6vw,1.9rem); line-height:1.32; margin:.1em 0 .5em; }
  h3{ font-family:"Zen Maru Gothic"; font-weight:700; font-size:1.06rem; margin:1.5em 0 .3em; }
  p{ margin:.7em 0; } .soft{ color:var(--ink-soft); }
  .lead-line{ font-size:1.1rem; font-weight:500; }
  .big-point{ background:var(--persimmon-soft); border-left:6px solid var(--persimmon); border-radius:0 16px 16px 0;
    padding:15px 17px; margin:18px 0; font-weight:700; font-size:1.06rem; }
  .big-point.blue{ background:#E7F2F7; border-left-color:var(--sky); }
  .big-point.mint{ background:#E9F6ED; border-left-color:var(--mint); }
  b.k{ color:var(--persimmon-deep); } b.kb{ color:var(--sky-deep); } b.kg{ color:var(--mint-deep); } b.kp{ color:var(--plum-deep); }
  .hr{ height:1px; background:var(--line); border:none; margin:44px 0; }

  /* card / panel */
  .panel{ background:var(--card); border:1px solid var(--line); border-radius:22px; box-shadow:var(--shadow); padding:20px 16px; margin:16px 0; }

  /* symbol morph */
  .morph{ display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap; margin:18px 0; }
  .mchip{ font-family:"Zen Maru Gothic"; font-weight:900; border-radius:16px; padding:14px 16px; text-align:center; }
  .mchip .big{ font-size:2.4rem; line-height:1; display:block; }
  .mchip .sub{ font-size:.78rem; font-weight:700; color:var(--ink-soft); margin-top:4px; }
  .mchip.a{ background:var(--persimmon-soft); color:var(--persimmon-deep); }
  .mchip.b{ background:#E7F2F7; color:var(--sky-deep); }
  .mchip.c{ background:#E9F6ED; color:var(--mint-deep); }
  .marrow{ font-family:"Zen Maru Gothic"; font-weight:900; font-size:1.4rem; color:var(--ink-soft); }

  /* 100 grids */
  .grid100{ display:grid; grid-template-columns:repeat(10,1fr); gap:3px; max-width:300px; margin:0 auto; aspect-ratio:1/1; }
  .gcell{ border-radius:4px; background:var(--grid-empty); transition:background .1s, transform .08s; }
  .gcell.on{ background:var(--persimmon); }
  .gcell.tap{ cursor:pointer; } .gcell.tap:active{ transform:scale(.85); }
  .grid-cap{ text-align:center; font-size:.82rem; color:var(--ink-soft); margin-top:10px; }

  .bignum{ text-align:center; font-family:"Zen Maru Gothic"; font-weight:900; line-height:1; }
  .bignum .v{ font-size:clamp(3rem,15vw,4.2rem); color:var(--persimmon-deep); }
  .bignum .u{ font-size:1.4rem; color:var(--persimmon); }
  .cap{ text-align:center; min-height:1.7em; font-weight:700; margin:6px 0 8px; font-size:1.05rem; }

  /* slider */
  .slabels{ display:flex; justify-content:space-between; font-size:.76rem; color:var(--ink-soft); padding:12px 2px 4px; }
  input[type=range]{ -webkit-appearance:none; appearance:none; width:100%; height:14px; border-radius:999px; outline:none;
    background:linear-gradient(90deg,#FCDFC7,#F7CDAC); }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; appearance:none; width:34px; height:34px; border-radius:50%;
    background:var(--persimmon); border:4px solid #fff; box-shadow:0 3px 8px rgba(222,110,47,.45); cursor:pointer; }
  input[type=range]::-moz-range-thumb{ width:30px; height:30px; border-radius:50%; background:var(--persimmon); border:4px solid #fff; cursor:pointer; }
  input[type=range]:focus-visible{ box-shadow:0 0 0 4px rgba(79,163,199,.4); }
  .qbs{ display:flex; gap:7px; justify-content:center; flex-wrap:wrap; margin-top:12px; }
  .qb{ font-family:"Zen Maru Gothic"; font-weight:700; font-size:.84rem; border:1.5px solid var(--line); background:#fff;
    color:var(--ink); padding:6px 12px; border-radius:999px; cursor:pointer; }
  .qb:active,.qb.on{ background:var(--persimmon-soft); border-color:var(--persimmon); color:var(--persimmon-deep); }
  .qb:focus-visible{ outline:3px solid rgba(79,163,199,.45); outline-offset:2px; }
  .ctrlbtn{ font-family:"Zen Maru Gothic"; font-weight:700; font-size:.85rem; border:1.5px solid var(--line); background:#fff;
    color:var(--ink-soft); padding:8px 16px; border-radius:999px; cursor:pointer; }

  /* multi-rep */
  .reps{ display:grid; gap:16px; }
  .rep-title{ font-size:.78rem; font-weight:700; color:var(--ink-soft); text-align:center; margin-bottom:6px; }
  .pie{ width:130px; height:130px; border-radius:50%; margin:0 auto; border:3px solid #fff; box-shadow:var(--shadow);
    background:conic-gradient(var(--persimmon) 0deg, var(--grid-empty) 0deg); display:grid; place-items:center; }
  .pie .pin{ width:60px; height:60px; border-radius:50%; background:var(--card); display:grid; place-items:center;
    font-family:"Zen Maru Gothic"; font-weight:900; color:var(--persimmon-deep); font-size:1rem; }
  .track{ height:30px; background:var(--grid-empty); border-radius:999px; overflow:hidden; border:1px solid var(--line); }
  .fill{ height:100%; width:0%; border-radius:999px; transition:width .12s; background:linear-gradient(90deg,var(--persimmon),var(--persimmon-deep)); }
  .numline{ position:relative; height:54px; margin:6px 4px 0; }
  .nl-track{ position:absolute; top:24px; left:0; right:0; height:8px; background:var(--grid-empty); border-radius:999px; }
  .nl-fill{ position:absolute; top:24px; left:0; height:8px; background:var(--persimmon); border-radius:999px; transition:width .12s; }
  .nl-dot{ position:absolute; top:18px; width:20px; height:20px; border-radius:50%; background:var(--persimmon-deep); border:3px solid #fff; box-shadow:0 2px 5px rgba(0,0,0,.2); transition:left .12s; transform:translateX(-50%); }
  .nl-ticks{ position:absolute; top:36px; left:0; right:0; display:flex; justify-content:space-between; font-size:.7rem; color:var(--ink-soft); }

  /* landmark gallery */
  .gallery{ display:grid; grid-template-columns:1fr 1fr; gap:11px; }
  .lm{ background:var(--card); border:1px solid var(--line); border-radius:16px; padding:12px; text-align:center; box-shadow:var(--shadow); }
  .lm .mini{ display:grid; grid-template-columns:repeat(10,1fr); gap:1.5px; width:84px; height:84px; margin:0 auto 8px; }
  .lm .mini div{ background:var(--grid-empty); border-radius:1.5px; } .lm .mini div.on{ background:var(--persimmon); }
  .lm .pct{ font-family:"Zen Maru Gothic"; font-weight:900; color:var(--persimmon-deep); font-size:1.2rem; }
  .lm .emo{ font-size:1.1rem; } .lm .anchor{ font-size:.8rem; color:var(--ink-soft); font-weight:700; }
  .lm.wide{ grid-column:1 / -1; }
  .lm .twomini{ display:flex; gap:8px; justify-content:center; }

  /* of-what cards */
  .whats{ display:grid; grid-template-columns:1fr 1fr; gap:11px; margin-top:6px; }
  .wcard{ background:var(--card); border:1px solid var(--line); border-radius:16px; padding:13px; box-shadow:var(--shadow); }
  .wcard .top{ display:flex; align-items:center; gap:8px; font-weight:700; font-size:.9rem; }
  .wcard .top .e{ font-size:1.3rem; }
  .wcard .res{ font-family:"Zen Maru Gothic"; font-weight:900; font-size:1.4rem; color:var(--persimmon-deep); margin:6px 0 4px; }
  .wcard .wtrack{ height:14px; background:var(--grid-empty); border-radius:999px; overflow:hidden; }
  .wcard .wfill{ height:100%; background:var(--persimmon); width:0%; transition:width .12s; border-radius:999px; }

  /* per-square worth */
  .worth-grid{ display:grid; grid-template-columns:repeat(10,1fr); gap:2px; max-width:280px; margin:0 auto; aspect-ratio:1/1; }
  .wg{ background:var(--grid-empty); border-radius:3px; transition:background .08s; } .wg.on{ background:var(--persimmon); }
  .worth-readout{ text-align:center; margin:12px 0 4px; }
  .worth-readout .lab{ font-size:.82rem; color:var(--ink-soft); }
  .worth-readout .tot{ font-family:"Zen Maru Gothic"; font-weight:900; font-size:2.2rem; color:var(--persimmon-deep); }
  .perpill{ display:inline-block; background:#E7F2F7; color:var(--sky-deep); font-family:"Zen Maru Gothic"; font-weight:900;
    border-radius:999px; padding:6px 14px; font-size:.95rem; margin:6px 0; }
  .w-in{ display:flex; align-items:center; gap:8px; justify-content:center; }
  .w-in input[type=number]{ width:120px; font-size:1.15rem; font-family:"Zen Maru Gothic"; font-weight:700; padding:9px 11px;
    border:2px solid var(--line); border-radius:11px; background:#fff; color:var(--ink); text-align:center; -moz-appearance:textfield; }
  .w-in input:focus-visible{ outline:none; border-color:var(--sky); box-shadow:0 0 0 3px rgba(79,163,199,.25); }

  /* battery */
  .battery{ margin:12px auto; max-width:260px; height:34px; border:3px solid var(--ink); border-radius:8px; position:relative; background:#fff; overflow:hidden; }
  .battery::after{ content:""; position:absolute; right:-10px; top:50%; transform:translateY(-50%); width:7px; height:16px; background:var(--ink); border-radius:0 3px 3px 0; }
  .battfill{ height:100%; width:70%; background:var(--mint); transition:width .12s, background .12s; }
  .realrow{ display:grid; grid-template-columns:1fr 1fr; gap:11px; margin-top:14px; }
  .rcard{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px; box-shadow:var(--shadow); }
  .rcard h4{ margin:0 0 6px; font-family:"Zen Maru Gothic"; font-weight:700; font-size:.92rem; }
  .rcard .e{ margin-right:5px; }
  .minibar{ height:12px; background:var(--grid-empty); border-radius:999px; overflow:hidden; margin-top:6px; }
  .minibar div{ height:100%; background:var(--sky); border-radius:999px; }

  /* quiz */
  .quiz{ background:var(--card); border:2px solid var(--persimmon-soft); border-radius:20px; box-shadow:var(--shadow); padding:18px 16px; }
  .quiz .q{ text-align:center; font-weight:700; margin-bottom:10px; }
  .quiz .opts{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:8px; }
  .quiz .opt{ font-family:"Zen Maru Gothic"; font-weight:900; font-size:1.2rem; padding:14px; border-radius:14px;
    border:2px solid var(--line); background:#fff; color:var(--ink); cursor:pointer; }
  .quiz .opt.correct{ background:#E9F6ED; border-color:var(--mint); color:var(--mint-deep); }
  .quiz .opt.wrong{ background:#FDECEA; border-color:#E0897F; color:#C2493E; }
  .quiz .fb{ text-align:center; min-height:1.6em; font-weight:700; margin-top:10px; }
  .quiz .score{ text-align:center; font-size:.82rem; color:var(--ink-soft); margin-top:4px; }
  .quiz .next{ display:block; margin:12px auto 0; font-family:"Zen Maru Gothic"; font-weight:700; background:var(--persimmon);
    color:#fff; border:none; border-radius:999px; padding:10px 22px; cursor:pointer; }

  .pit{ background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px 16px; margin:12px 0; box-shadow:var(--shadow); }
  .pit .tag{ display:inline-block; background:#FDE0DC; color:#C2493E; font-weight:700; font-size:.74rem; padding:3px 10px; border-radius:999px; margin-bottom:6px; }
  .pit b{ color:var(--persimmon-deep); }

  .closing{ text-align:center; color:var(--ink-soft); margin-top:48px; font-size:.96rem; }
  .closing .leaf{ font-size:1.5rem; } .closing b{ color:var(--persimmon-deep); }

  /* ---- page nav / switching ---- */
  .topnav{ position:sticky; top:0; z-index:30; background:rgba(252,245,234,.93); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); }
  .topnav .inner{ max-width:680px; margin:0 auto; padding:8px 14px; display:flex; align-items:center; gap:8px; }
  .topnav .lz{ font-size:1.2rem; }
  .tabs{ display:flex; gap:6px; flex:1; }
  .tab{ flex:1; font-family:"Zen Maru Gothic"; font-weight:700; font-size:.83rem; border:1.5px solid var(--line); background:#fff;
    color:var(--ink-soft); padding:8px 6px; border-radius:999px; cursor:pointer; text-align:center; transition:.15s; }
  .tab.on{ background:var(--persimmon); border-color:var(--persimmon); color:#fff; }
  .tab:focus-visible{ outline:3px solid rgba(79,163,199,.45); outline-offset:2px; }
  .page{ display:none; } .page.active{ display:block; }

  .jumpwrap{ text-align:center; margin:34px 0 6px; padding:24px 18px; border-radius:22px; border:1px solid var(--line);
    background:linear-gradient(180deg,#FFF3E9,#FFE5CF); box-shadow:var(--shadow); }
  .jumphint{ font-weight:700; color:var(--persimmon-deep); margin-bottom:12px; font-size:1.02rem; }
  .jumpbtn{ font-family:"Zen Maru Gothic"; font-weight:900; font-size:1.08rem; background:var(--persimmon); color:#fff; border:none;
    border-radius:999px; padding:15px 28px; cursor:pointer; box-shadow:0 6px 16px rgba(222,110,47,.36); }
  .jumpbtn:active{ transform:translateY(1px); }
  .backtop{ margin-top:18px; font-family:"Zen Maru Gothic"; font-weight:700; font-size:.88rem; color:var(--sky-deep);
    background:#fff; border:1.5px solid var(--line); border-radius:999px; padding:9px 18px; cursor:pointer; }

  /* ---- page 2 specific ---- */
  .druggallery{ display:grid; grid-template-columns:1fr 1fr; gap:11px; }
  .dcard{ background:var(--card); border:1px solid var(--line); border-radius:16px; padding:13px 10px; box-shadow:var(--shadow); text-align:center; }
  .dcard .e{ font-size:1.5rem; } .dcard .nm{ font-weight:700; font-size:.84rem; margin:2px 0 7px; line-height:1.3; }
  .dcard .conv{ font-family:"Zen Maru Gothic"; font-weight:900; font-size:1.05rem; }
  .dcard .pc{ color:var(--ink); } .dcard .ar{ color:var(--sky-deep); font-size:.8rem; } .dcard .mg{ color:var(--persimmon-deep); }
  .gramblocks{ display:flex; flex-wrap:wrap; gap:3px; justify-content:center; margin:12px 0 6px; min-height:28px; }
  .gblock{ width:26px; height:26px; border-radius:5px; background:linear-gradient(180deg,var(--persimmon),var(--persimmon-deep));
    display:grid; place-items:center; color:#fff; font-size:.56rem; font-weight:700; line-height:1; }
  .gmore{ align-self:center; color:var(--ink-soft); font-weight:700; font-size:.8rem; }
  .bag{ width:130px; margin:8px auto 4px; }
  .bag-hook{ width:34px; height:20px; border:3px solid var(--sky-deep); border-bottom:none; border-radius:16px 16px 0 0; margin:0 auto; }
  .bag-body{ height:150px; border:3px solid var(--sky-deep); border-radius:10px 10px 18px 18px; position:relative; overflow:hidden; background:#F4FAFC; }
  .bag-liquid{ position:absolute; left:0; right:0; bottom:0; background:linear-gradient(180deg,#B6DCEC,#7FC2DE); transition:height .15s;
    display:flex; align-items:flex-end; justify-content:center; padding-bottom:6px; font-family:"Zen Maru Gothic"; font-weight:900; color:var(--sky-deep); font-size:.9rem; }
  .convbox{ text-align:center; margin:6px 0; }
  .convbox .from{ font-family:"Zen Maru Gothic"; font-weight:900; font-size:2.2rem; color:var(--ink); }
  .convbox .from .u{ font-size:1rem; color:var(--ink-soft); }
  .convbox .eqs{ font-family:"Zen Maru Gothic"; font-weight:900; color:var(--sky-deep); font-size:1.2rem; margin:0 4px; }
  .convbox .to{ font-family:"Zen Maru Gothic"; font-weight:900; font-size:2.2rem; color:var(--persimmon-deep); }
  .convbox .to .u{ font-size:.95rem; color:var(--persimmon); }
  .convbox .sub{ font-size:.84rem; color:var(--ink-soft); margin-top:4px; }
  .why{ text-align:center; background:#E7F2F7; border-radius:12px; padding:10px 12px; font-size:.88rem; color:var(--sky-deep); font-weight:700; margin:10px 0; }
  .seg2{ display:flex; gap:6px; margin:6px 0; }
  .seg2 button{ flex:1; font-family:"Zen Maru Gothic"; font-weight:700; font-size:.85rem; padding:8px; border-radius:10px;
    border:2px solid var(--line); background:#fff; color:var(--ink-soft); cursor:pointer; }
  .seg2 button.on{ border-color:var(--persimmon); background:var(--persimmon-soft); color:var(--persimmon-deep); }
  .w-steps{ font-size:.84rem; color:var(--ink-soft); margin-top:12px; line-height:1.7; background:#FBF4EB; border-radius:12px; padding:11px 13px; }
  .w-steps b{ color:var(--ink); }

<template id="tpl-percent">
<div id="page1" class="page active">

  <header class="hero">
    <span class="eyebrow">とことん版 ・ 新しい標準</span>
    <h1><span class="hl">パーセント</span>を、<br>“絵”にする。</h1>
    <p class="lead">覚えるんじゃない。読み終わったら、<br>パーセントが頭に絵で浮かぶようにする。</p>
  </header>

  <!-- ===== 1. 記号の正体 ===== -->
  <section>
    <div class="step-no"><span class="dot">1</span>まず、記号の正体</div>
    <h2>「％」は、かくれた「÷100」</h2>
    <p class="lead-line">いきなり結論。<b class="k">「％」というマークは、「100で割る」「100コのうち」を表す、ただのしるし</b>です。</p>
    <p>「パーセント（per cent）」の <b>cent（セント）</b> は「100」という意味。100円玉、100年（century）、100m走…ぜんぶ仲間。<br>そして「per」は「〜につき」。つまり <b class="k">パーセント＝「100につき、いくつ」</b>。</p>

    <div class="panel">
      <div class="morph">
        <div class="mchip a"><span class="big">％</span><span class="sub">このマーク</span></div>
        <div class="marrow">＝</div>
        <div class="mchip b"><span class="big">／100</span><span class="sub">「100で割る」</span></div>
        <div class="marrow">＝</div>
        <div class="mchip c"><span class="big">100コ中</span><span class="sub">「100コのうち、いくつ」</span></div>
      </div>
      <p class="soft" style="text-align:center; margin:6px 0 0; font-size:.88rem;">よく見ると「％」の中の小さな ○○ は「00」、ななめの線は「わける（/）」。<br>記号そのものが「/100」のかたちをしているんです。</p>
    </div>

    <div class="big-point blue">これから先、<b class="kb">「○％」を見たら、心の中で「100コのうち、○コ」</b>と読みかえる。<br>たったこれだけで、パーセントは怖くなくなります。</div>
  </section>

  <hr class="hr">

  <!-- ===== 2. 100コの世界（タップ） ===== -->
  <section>
    <div class="step-no"><span class="dot">2</span>ホームベース</div>
    <h2>「ぜんぶ」を、100コに切る</h2>
    <p class="lead-line">パーセントの世界では、<b class="k">どんな「ぜんぶ」も、いったん100コのマスに切りそろえます。</b></p>
    <p>下の100マスが、その「ぜんぶ」。<b>1マス＝1％</b>です。<br>
    マスを<b class="k">タップして自分でぬってみてください。</b>ぬったマスの数が、そのまま「％」になります。指で“作る”と、体にしみこみます。</p>

    <div class="panel">
      <div class="bignum"><span class="v" id="s2v">0</span><span class="u">%</span></div>
      <div class="cap" id="s2cap">マスをタップしてぬってみよう</div>
      <div class="grid100" id="s2grid"></div>
      <div class="grid-cap">🟧 ぬったマス　／　⬜ まだのマス　（ぜんぶで100マス・1マス＝1%）</div>
      <div class="qbs" style="margin-top:14px;">
        <button class="ctrlbtn" id="s2clear">ぜんぶ消す</button>
        <button class="ctrlbtn" id="s2fill">ぜんぶぬる</button>
      </div>
    </div>
    <p class="soft">10マスで1列。だから <b class="k">1列＝10％</b>。半分の5列で50％。この“列の感覚”も、あとでめちゃくちゃ効きます。</p>
  </section>

  <hr class="hr">

  <!-- ===== 3. 同じ量、いろんな顔 ===== -->
  <section>
    <div class="step-no"><span class="dot">3</span>5つの顔</div>
    <h2>同じパーセントを、いろんな形で</h2>
    <p class="lead-line">マス・円・棒・数直線——<b class="k">見た目がちがうだけで、ぜんぶ同じ量</b>です。</p>
    <p>スライダーを動かすと、4つの絵がぜんぶ一緒に動きます。「あ、これ全部おなじことなんだ」が体で分かると、パーセントが立体的に見えてきます。</p>

    <div class="panel">
      <div class="bignum" style="margin-bottom:6px;"><span class="v" id="s3v">40</span><span class="u">%</span></div>
      <div class="cap" id="s3cap"></div>

      <div class="reps">
        <div><div class="rep-title">① 100マス</div><div class="grid100" id="s3grid" style="max-width:240px;"></div></div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px; align-items:center;">
          <div><div class="rep-title">② 円（まる）</div><div class="pie" id="s3pie"><div class="pin" id="s3pin">40%</div></div></div>
          <div><div class="rep-title">③ 棒（ぼう）</div><div class="track"><div class="fill" id="s3bar"></div></div></div>
        </div>
        <div><div class="rep-title">④ 数直線（めもり）</div>
          <div class="numline"><div class="nl-track"></div><div class="nl-fill" id="s3nlf"></div><div class="nl-dot" id="s3nld"></div>
            <div class="nl-ticks"><span>0</span><span>25</span><span>50</span><span>75</span><span>100</span></div></div>
        </div>
      </div>

      <div class="slabels"><span>0%</span><span>100%</span></div>
      <input type="range" id="s3s" min="0" max="100" value="40">
      <div class="qbs">
        <button class="qb" data-v="10">10%</button><button class="qb" data-v="25">25%</button>
        <button class="qb" data-v="50">50%</button><button class="qb" data-v="75">75%</button><button class="qb" data-v="100">100%</button>
      </div>
    </div>
  </section>

  <hr class="hr">

  <!-- ===== 4. ランドマーク ===== -->
  <section>
    <div class="step-no"><span class="dot">4</span>絵で覚える目印</div>
    <h2>“よく出る％”を、絵のまま記憶</h2>
    <p class="lead-line">いちいち計算しなくても、<b class="k">パッと絵が浮かぶ目印</b>をいくつか持っておくと、一生ラクです。</p>
    <p>下のカードを「数字」じゃなく「<b>絵と例え</b>」で見てください。ピザ・ケーキ・電池…身近なモノとセットにすると、忘れません。</p>

    <div class="gallery" id="s4gallery"></div>
    <div class="big-point">大事：<b class="k">100％は「たくさん」じゃなくて「ぜんぶ・まるごと」</b>。<br>そして <b class="k">200％は「2つ分」</b>。パーセントは100を超えることもあります（下の最後のカード）。</div>
  </section>

  <hr class="hr">

  <!-- ===== 5. 何の100か ===== -->
  <section>
    <div class="step-no"><span class="dot">5</span>いちばん大事なところ</div>
    <h2>「何の」100か？で、中身が変わる</h2>
    <p class="lead-line">ここがパーセントの<b class="k">いちばんの山場</b>。でも絵で見れば一発です。</p>
    <p>パーセントは「<b>切り取る割合のレシピ</b>」。同じ「50％」でも、<b class="k">“何の”50％かで、出てくる量はぜんぜん違います。</b><br>
    下のスライダーで同じ％を、4つの「ぜんぶ」に同時にかけてみてください。全部「同じ割合」なのに、量がバラバラなのが見えます。</p>

    <div class="panel">
      <div class="bignum" style="margin-bottom:4px;"><span class="v" id="s5v">50</span><span class="u">%</span></div>
      <div class="cap soft" style="font-weight:700; font-size:.95rem;">↓ この割合を、それぞれの「ぜんぶ」にかけると…</div>
      <div class="whats" id="s5cards"></div>
      <div class="slabels"><span>0%</span><span>100%</span></div>
      <input type="range" id="s5s" min="0" max="100" value="50">
      <div class="qbs">
        <button class="qb" data-v="10">10%</button><button class="qb" data-v="25">25%</button>
        <button class="qb" data-v="50">50%</button><button class="qb" data-v="100">100%</button>
      </div>
    </div>
    <div class="big-point mint">だから、パーセントは<b class="kg">いつも「何の％か」とセット</b>。<br>「50％」だけでは量は決まらない。「<b>何の</b>50％か」で決まります。</div>
  </section>

  <hr class="hr">

  <!-- ===== 6. 1マスの値打ち（計算の正体） ===== -->
  <section>
    <div class="step-no"><span class="dot">6</span>計算の正体も、絵</div>
    <h2>「○○の△％」を、絵で出す</h2>
    <p class="lead-line">公式を覚えなくていい。<b class="k">「1マスにいくらの値打ちがあるか」</b>さえ見えれば、計算は“数えるだけ”になります。</p>
    <p>「ぜんぶ」を100マスに切ると、<b class="k">1マスの値打ち＝ぜんぶ÷100</b>。<br>あとは、ほしい％のぶんだけマスを点灯させて、足していくだけ。下で「ぜんぶの数」を変えて、スライダーを動かしてみてください。</p>

    <div class="panel">
      <div class="w-in" style="margin-bottom:6px;">「ぜんぶ」＝ <input type="number" id="s6n" value="200" min="0"> 個</div>
      <div style="text-align:center;"><span class="perpill">1マスの値打ち ＝ 200 ÷ 100 ＝ <span id="s6per">2</span></span></div>
      <div class="worth-grid" id="s6grid" style="margin-top:10px;"></div>
      <div class="worth-readout">
        <div class="lab"><span id="s6pct">30</span>% ＝ <span id="s6cnt">30</span>マス点灯　→　1マス<span id="s6per2">2</span> が <span id="s6cnt2">30</span>個</div>
        <div class="tot"><span id="s6tot">60</span></div>
      </div>
      <div class="slabels"><span>0%</span><span>100%</span></div>
      <input type="range" id="s6s" min="0" max="100" value="30">
    </div>
    <div class="big-point">「200の30％」＝「1マス2が30個」＝ <b class="k">60</b>。<br>これが「<b>○○ × △ ÷ 100</b>」の正体。式じゃなくて、<b class="k">マスの足し算</b>として見えていればOKです。</div>
  </section>

  <hr class="hr">

  <!-- ===== 6b. ÷％で全体にもどる ===== -->
  <section>
    <div class="step-no"><span class="dot" style="background:var(--sky)">÷</span>もどす</div>
    <h2>割ると、「全体」にもどる</h2>
    <p class="lead-line">掛け算と割り算は、行きと帰り。<b class="kb">全体に ×％ すると一部</b>。逆に、<b class="kb">一部を ÷％ すると、全体にもどります</b>。</p>
    <p>「<b class="k">60は30％にあたる。じゃあ全体は？</b>」みたいなとき。30マスで60なら、1マス＝60÷30＝2。全体（100マス）＝2×100＝<b class="kb">200</b>。これが「<b class="kb">何か ÷ 何か％</b>」の正体です。</p>
    <div class="panel">
      <div class="w-in" style="margin-bottom:6px;">一部 ＝ <input type="number" id="s6wpart" value="60" min="0"> 個</div>
      <div class="slabels"><span>1%</span><span>100%</span></div>
      <input type="range" id="s6wpct" min="1" max="100" value="30">
      <div style="text-align:center;"><span class="perpill"><span id="s6wpctlab">30</span>％にあたる → 1マス ＝ <span id="s6wpa">60</span> ÷ <span id="s6wpb">30</span> ＝ <span id="s6wper">2</span></span></div>
      <div class="worth-grid" id="s6wgrid" style="margin-top:10px;"></div>
      <div class="worth-readout">
        <div class="lab">点灯マス＝一部。100マス全部が…</div>
        <div class="tot">全体 <span id="s6wtot">200</span></div>
      </div>
      <div class="w-steps" id="s6wsteps"></div>
    </div>
    <div class="big-point blue">
      全体 <b class="kb">×％</b> → 一部　（行き）<br>
      一部 <b class="kb">÷％</b> → 全体　（帰り：もとの全体にもどる）
    </div>
    <p class="soft">「<b>何か ÷ 何か％</b>」は、掛けたのを<b>もとに戻す</b>動き。だから答えは“もとの全体”になります。「<b class="kb">全体は？って聞かれたら ÷％</b>」でOK。</p>
  </section>

  <hr class="hr">

  <!-- ===== 6c. 割り算の向き（何%） ===== -->
  <section>
    <div class="step-no"><span class="dot" style="background:var(--sky)">％</span>何％</div>
    <h2>「何％か」を出すのは、割り算</h2>
    <p class="lead-line">さっきは「全体 → ×％ → 一部」（掛け算）でした。今度はその逆。<b class="kb">「この一部は、全体の何％？」を知るには ÷（割り算）</b>です。</p>
    <p>絵はまったく同じ。<b class="k">1マスの値打ち＝全体÷100</b>。一部が「そのマス何個ぶん」かを数えれば、それが<b class="kb">そのまま％</b>になります。</p>
    <div class="panel">
      <div class="w-in" style="margin-bottom:6px;">「ぜんぶ」＝ <input type="number" id="s6bn" value="200" min="1"> 個</div>
      <div style="text-align:center;"><span class="perpill">1マスの値打ち ＝ <span id="s6bn2">200</span> ÷ 100 ＝ <span id="s6bper">2</span></span></div>
      <div class="worth-grid" id="s6bgrid" style="margin-top:10px;"></div>
      <div class="worth-readout">
        <div class="lab">一部 <span id="s6bpart">60</span> は、1マス<span id="s6bper2">2</span> が <span id="s6bcnt">30</span>個ぶん</div>
        <div class="tot"><span id="s6bpct">30</span>%</div>
      </div>
      <div class="slabels"><span>一部 0</span><span>一部 ＝ ぜんぶ</span></div>
      <input type="range" id="s6bs" min="0" max="200" value="60">
      <div class="w-steps" id="s6bsteps"></div>
    </div>
    <div class="big-point blue">
      ・「全体の○％は<b>いくつ</b>？」 → <b class="kb">全体 × ○％</b>（×で、<b>量</b>を取り出す）<br>
      ・「この一部は全体の<b>何％</b>？」 → <b class="kb">一部 ÷ 全体</b>（÷で、<b>割合</b>を出す）
    </div>
    <p class="soft">同じパーセントでも、<b>×は「量」</b>を出し、<b>÷は「％（割合）」</b>を出す。やりたいことが逆なんです。まよったら——<b class="kb">「何％？」って聞かれたら割り算</b>、と覚えてOK。</p>
  </section>

  <hr class="hr">

  <!-- ===== 7. 身のまわり ===== -->
  <section>
    <div class="step-no"><span class="dot">7</span>もう使ってる</div>
    <h2>身のまわりは、％だらけ</h2>
    <p class="lead-line">気づいてないだけで、毎日パーセントを見ています。ぜんぶ「100のうち、いくつ」です。</p>

    <div class="panel">
      <h3 style="margin-top:0;">🔋 スマホの電池</h3>
      <p class="soft" style="margin:0 0 4px;">「電池70％」＝ 満タンを100としたとき、いま70の分だけ残ってる。スライダーで動かしてみよう。</p>
      <div class="battery"><div class="battfill" id="s7batt"></div></div>
      <div style="text-align:center; font-weight:700;"><span id="s7num">70</span>% 残り</div>
      <input type="range" id="s7s" min="0" max="100" value="70" style="margin-top:10px;">

      <div class="realrow">
        <div class="rcard"><h4><span class="e">⬇️</span>ダウンロード</h4><div class="soft" style="font-size:.82rem;">「60%完了」＝ あと40%で終わり</div><div class="minibar"><div style="width:60%"></div></div></div>
        <div class="rcard"><h4><span class="e">🏷️</span>セール</h4><div class="soft" style="font-size:.82rem;">「20%引き」＝ 100のうち20だけ安く</div><div class="minibar"><div style="width:20%; background:var(--persimmon);"></div></div></div>
        <div class="rcard"><h4><span class="e">💯</span>テスト</h4><div class="soft" style="font-size:.82rem;">「80点」＝ 100点満点の80%</div><div class="minibar"><div style="width:80%; background:var(--mint);"></div></div></div>
        <div class="rcard"><h4><span class="e">☔️</span>降水確率</h4><div class="soft" style="font-size:.82rem;">「30%」＝ 100回のうち30回くらい降る</div><div class="minibar"><div style="width:30%; background:var(--plum);"></div></div></div>
      </div>
    </div>
  </section>

  <hr class="hr">

  <!-- ===== 8. クイズ ===== -->
  <section>
    <div class="step-no"><span class="dot">8</span>遊んで染み込ませる</div>
    <h2>パッと見て、何％？</h2>
    <p class="lead-line">最後は“当てっこ”。絵を見て、何％か当ててみてください。<b class="k">見た目で％が分かる</b>ようになれば、もう体に入っています。</p>

    <div class="quiz">
      <div class="q">この円、何％にぬられてる？</div>
      <div class="pie" id="qpie" style="margin:10px auto;"><div class="pin" id="qpin">?</div></div>
      <div class="opts" id="qopts"></div>
      <div class="fb" id="qfb"></div>
      <div class="score" id="qscore">正解 0 / 0</div>
      <button class="next" id="qnext" style="display:none;">つぎの問題 ›</button>
    </div>
  </section>

  <hr class="hr">

  <!-- ===== 9. つまずき・まとめ ===== -->
  <section>
    <div class="step-no"><span class="dot">9</span>仕上げ</div>
    <h2>つまずきポイント</h2>
    <div class="pit"><span class="tag">勘違い①</span><p style="margin:0"><b>100%＝「たくさん」ではない。</b><br><span class="soft">100%は「ぜんぶ・まるごと1つ分」。それ以上の200%（2つ分）もあります。</span></p></div>
    <div class="pit"><span class="tag">勘違い②</span><p style="margin:0"><b>「何の％か」が決まらないと、量は決まらない。</b><br><span class="soft">1000円の10%は100円、500円の10%は50円。“もとの100”が何かを必ず確認。</span></p></div>
    <div class="pit"><span class="tag">勘違い③</span><p style="margin:0"><b>「20%」と「20%引き」は別もの。</b><br><span class="soft">「20%引き」は安くなる分が20%で、払うのは残りの80%。</span></p></div>
  </section>

  <p class="closing">
    <span class="leaf">🍁</span><br>
    パーセントは、覚える記号じゃなくて、<br>
    <b>「100マスのうち、いくつ」という“絵”</b>。<br>
    数字を見て、この100マスが浮かべばゴールです。
  </p>

  <div class="jumpwrap">
    <div class="jumphint">パーセントの“絵”はもうバッチリ。<br>じゃあ、これを白衣の世界へ持っていきましょう。</div>

  </div>

</div><!-- /page1 -->
<div id="page2" class="page">

  <header class="hero">
    <span class="eyebrow">現場へ ・ 白衣のパーセント</span>
    <h1>その電卓、<br><span class="hl">何をしてる</span>の？</h1>
    <p class="lead">さっきの100マスを、そのまま薬の世界へ。<br>現場でやってる計算の“正体”を、ぜんぶ絵にします。</p>
  </header>

  <div class="big-point">合言葉のおさらい：<b class="k">％＝100のうち、いくつ</b>。<br>薬では、その「100」が <b class="k">製剤100g</b>（軟膏・散剤）か <b class="k">100mL</b>（液剤）に変わるだけです。</div>

  <!-- A -->
  <section>
    <div class="step-no"><span class="dot">A</span>持ちこむ</div>
    <h2>100マスが「製剤100g」になる</h2>
    <p class="lead-line">ページ①の100マスは「ぜんぶ」でした。薬では、その「ぜんぶ」＝<b class="k">クリーム100g</b>。ぬったマスが<b class="k">薬（有効成分）</b>です。</p>
    <p>つまり「<b class="k">1%軟膏</b>」＝ クリーム100gのうち、薬は1マス分＝1g。残りの99マス（99g）は土台（基剤）。<br>下のスライダーで、100gの中の“薬の分”を見てください。</p>

    <div class="panel">
      <div class="bignum"><span class="v" id="p2av">1</span><span class="u">%</span><span style="font-size:1rem;color:var(--ink-soft)"> の軟膏</span></div>
      <div class="cap" id="p2acap"></div>
      <div class="grid100" id="p2agrid"></div>
      <div class="grid-cap">🟧 ＝ 薬（有効成分）　／　⬜ ＝ 土台（基剤）　…ぜんぶで製剤100g</div>
      <div class="slabels" style="margin-top:6px;"><span>0%</span><span>10%</span></div>
      <input type="range" id="p2as" min="0" max="10" value="1" step="1">
      <div class="qbs">
        <button class="qb" data-v="1">1%</button><button class="qb" data-v="2">2%</button>
        <button class="qb" data-v="5">5%</button><button class="qb" data-v="10">10%</button>
      </div>
    </div>
    <p class="soft">見てのとおり、ほとんどが土台で薬はちょっぴり。「1%って意外と少ない」が体に入ればOKです。</p>
  </section>

  <hr class="hr">

  <!-- B -->
  <section>
    <div class="step-no"><span class="dot">B</span>ズームイン</div>
    <h2>でも現場は「1g」で見る</h2>
    <p class="lead-line">チューブを手に持つと、知りたいのは「<b class="k">1gの中に薬は何mg？</b>」。100gから1gへ、ぐっとズームします。</p>
    <p>ここで犯人が登場：<b class="k">1g＝1000mg</b>。これが「%の100」とケンカして混乱の元になります。でも順番にいけば平気。</p>
    <p>1%＝100g中1g →（1gあたりにする）→ 1g中0.01g →（mgに直す）→ <b class="k">1g中10mg</b>。<br>だから現場の合言葉は <b class="k">1% ＝ 1g中10mg ＝ 10mg/g</b>。</p>

    <div class="panel">
      <div style="text-align:center; font-weight:700;">製剤 1g（＝1000mg）の中の薬 ＝ <span style="font-family:'Zen Maru Gothic'; color:var(--persimmon-deep); font-size:1.3rem;"><span id="p2bmg">10</span>mg</span></div>
      <div class="barlab" style="display:flex; justify-content:space-between; font-size:.8rem; font-weight:700; margin:10px 0 3px;"><span>薬 <span id="p2bd">10mg</span></span><span class="soft">土台 <span id="p2bbase">990mg</span></span></div>
      <div class="track"><div class="fill" id="p2bbar" style="width:1%"></div></div>
      <div class="slabels"><span>0%</span><span>10%</span></div>
      <input type="range" id="p2bs" min="0" max="10" value="1" step="0.05">
      <div class="qbs">
        <button class="qb" data-v="0.1">0.1%</button><button class="qb" data-v="0.5">0.5%</button>
        <button class="qb" data-v="1">1%</button><button class="qb" data-v="2">2%</button>
        <button class="qb" data-v="5">5%</button><button class="qb" data-v="10">10%</button>
      </div>
    </div>
    <div class="big-point blue">これが現場の合言葉：<b class="kb">1% ＝ 1g中10mg</b>。<br>液体なら「1mL中10mg（＝10mg/mL）」。中身は同じで、入れ物が <b>g</b> か <b>mL</b> かの違いだけです。</div>
  </section>

  <hr class="hr">

  <!-- 濃度の定義 -->
  <section>
    <div class="step-no"><span class="dot" style="background:var(--sky)">語</span>ことばの確認</div>
    <h2>「濃度」って、こういうこと</h2>
    <p class="lead-line">このあと何度も出てくる「<b class="kb">濃度</b>」。むずかしく考えなくて大丈夫。<br>濃度＝<b class="kb">「1g（1mL）あたりに、薬が何mg入ってるか」＝ mg/g（mg/mL）</b>。それだけです。</p>
    <p>「濃度」の「濃」は<b>“濃い・薄い”</b>の濃。カルピスと同じで、<b class="kb">薬がぎゅっと詰まってれば「濃い」、スカスカなら「薄い」</b>。下のスライダーで、その“濃さ”を色で見てください。</p>

    <div class="panel">
      <div style="text-align:center;">
        <div id="concSwatch" style="width:120px;height:120px;border-radius:18px;margin:6px auto 10px;border:2px solid var(--line);"></div>
        <div class="bignum" style="font-size:1rem;"><span class="v" id="concPctV" style="font-size:2.2rem;">1</span><span class="u">%</span></div>
        <div style="font-weight:700;margin-top:2px;"><span id="concMggV">10</span> mg/g　＝　1g中に薬 <span id="concMgV">10</span>mg</div>
      </div>
      <div class="slabels"><span>うすい 0%</span><span>こい 10%</span></div>
      <input type="range" id="concS" min="0" max="10" value="1" step="0.05">
      <div class="qbs">
        <button class="qb" data-v="0.1">0.1%</button><button class="qb" data-v="0.5">0.5%</button>
        <button class="qb" data-v="1">1%</button><button class="qb" data-v="5">5%</button><button class="qb" data-v="10">10%</button>
      </div>
    </div>

    <h3>濃度の見本帳</h3>
    <p class="soft">同じ「クリーム1g」でも、濃度がちがうと中の薬の量がこれだけ変わります。<b class="k">色の濃さ＝薬の多さ</b>です。</p>
    <div class="druggallery" id="concSamples"></div>

    <div class="big-point blue">これから「<b class="kb">濃度</b>」と出てきたら、ぜんぶ<b class="kb">「mg/g（＝1gあたりの薬の量）」</b>のこと。<br>「%×10」で出たアレが、濃度の正体です。</div>
  </section>

  <hr class="hr">

  <!-- C -->
  <section>
    <div class="step-no"><span class="dot">C</span>電卓の正体 ①</div>
    <h2>「○%の薬を△g使うと何mg？」</h2>
    <p class="lead-line">現場でいちばん電卓を叩くこれ。正体は<b class="k">「1gあたりの薬の量を、使う量だけ集めるだけ」</b>です。</p>
    <p>ページ①の「1マスの値打ち」と同じこと。今度は <b class="k">「1gの値打ち＝%×10 mg」</b>。それを、使うg数のぶんだけ並べて足すだけ。</p>

    <div class="panel">
      <div class="seg2" id="p2cseg"><button class="on" data-u="g">g（軟膏・散剤）</button><button data-u="mL">mL（液剤）</button></div>
      <div class="w-in" style="margin:8px 0;">濃度 <input type="number" id="p2cc" value="5" min="0" step="0.05"> %</div>
      <div style="text-align:center;"><span class="perpill">1<span id="p2cu1">g</span>あたり ＝ <span id="p2cconc">5</span> ×10 ＝ <span id="p2cper">50</span> mg</span></div>
      <div class="slabels"><span>使う量 0</span><span>使う量 20<span id="p2cu2">g</span></span></div>
      <input type="range" id="p2cs" min="0" max="20" value="20" step="1">
      <div style="text-align:center; font-weight:700; margin-top:6px;">使う量 <span id="p2camt">20</span><span id="p2cu3">g</span></div>
      <div class="gramblocks" id="p2cblocks"></div>
      <div style="text-align:center;"><div class="soft" style="font-size:.82rem;">薬の合計</div><div style="font-family:'Zen Maru Gothic'; font-weight:900; font-size:2rem; color:var(--persimmon-deep);"><span id="p2ctot">1000</span> mg</div></div>
      <div class="w-steps" id="p2csteps"></div>
    </div>
    <div class="big-point">「5%軟膏を20g」＝ 1gに50mg が 20個 ＝ <b class="k">1000mg（＝1g）</b>。<br>電卓は「<b>%×10×使う量</b>」を計算してるだけ。絵では“gブロックを並べて足す”だけです。</div>
  </section>

  <hr class="hr">

  <!-- D -->
  <section>
    <div class="step-no"><span class="dot">D</span>絵で読む</div>
    <h2>ラベルの「%」を、mgの絵で読む</h2>
    <p class="lead-line">「%」を見たら、反射的に「mg/g（mg/mL）」が浮かぶようにします。コツはひとつ、<b class="k">×10</b>。</p>
    <p>下の実例を「数字」じゃなく「<b>×10すると何mgか</b>」の目で眺めてください。これを繰り返すと、ラベルがmgの絵に見えてきます。</p>
    <div class="druggallery" id="p2dgal"></div>
    <p class="soft" style="margin-top:10px;">確認：生食0.9% → ×10 → 9mg/mL。ちゃんと合いますね。表記が違っても、ぜんぶ同じ「×10」です。</p>
  </section>

  <hr class="hr">

  <!-- E -->
  <section>
    <div class="step-no"><span class="dot">E</span>電卓の正体 ②</div>
    <h2>なんで「×10」でmg/mLになるの？</h2>
    <p class="lead-line">現場の魔法「%×10＝mg/mL」。その中身は<b class="k">「×1000して、÷100」</b>です。</p>
    <p>g→mgは <b>×1000</b>（薬を細かいmgで数えるから）。でも%は「100のうち」だから <b>÷100</b>。<br>1000 ÷ 100 ＝ <b class="k">10</b>。差し引き、ちょうど×10になるんです。</p>

    <div class="panel">
      <div class="convbox">
        <span class="from"><span id="p2efrom">1</span><span class="u"> %</span></span>
        <span class="eqs">×10 ＝</span>
        <span class="to"><span id="p2eto">10</span><span class="u"> mg/mL（mg/g）</span></span>
        <div class="sub" id="p2esub"></div>
      </div>
      <div class="why">×1000（g→mg）して ÷100（%の100）→ 差し引き ×10</div>
      <div class="slabels"><span>0%</span><span>10%</span></div>
      <input type="range" id="p2es" min="0" max="10" value="1" step="0.05">
      <div class="qbs">
        <button class="qb" data-v="0.1">0.1%</button><button class="qb" data-v="0.9">0.9%</button>
        <button class="qb" data-v="1">1%</button><button class="qb" data-v="5">5%</button><button class="qb" data-v="10">10%</button>
      </div>
    </div>
  </section>

  <hr class="hr">

  <!-- F -->
  <section>
    <div class="step-no"><span class="dot">F</span>大きな「ぜんぶ」</div>
    <h2>点滴バッグで考える</h2>
    <p class="lead-line">バッグやボトルみたいな大きい「ぜんぶ」も、やることは同じ。<b class="k">全体の量に、%をかけるだけ</b>です。</p>
    <p>下はバッグ。濃さを選んで、量（mL）を動かすと、中に溶けてる薬の量が出ます。<b class="k">同じ濃さなら、量が増えるほど薬も増える</b>のが見えます。</p>

    <div class="panel">
      <div class="seg2" id="p2fseg"><button class="on" data-c="0.9">生食 0.9%</button><button data-c="5">ブドウ糖 5%</button><button data-c="10">ブドウ糖 10%</button></div>
      <div class="bag">
        <div class="bag-hook"></div>
        <div class="bag-body"><div class="bag-liquid" id="p2fliq" style="height:50%"><span id="p2fvoltxt">500mL</span></div></div>
      </div>
      <div class="slabels"><span>0mL</span><span>1000mL</span></div>
      <input type="range" id="p2fs" min="0" max="1000" value="500" step="50">
      <div style="text-align:center; margin-top:8px;"><div class="soft" style="font-size:.82rem;">バッグの中の薬</div><div style="font-family:'Zen Maru Gothic'; font-weight:900; font-size:2rem; color:var(--persimmon-deep);"><span id="p2fg">4.5</span> g</div></div>
      <div class="w-steps" id="p2fsteps"></div>
    </div>
    <div class="realrow">
      <div class="rcard"><h4><span class="e">🧴</span>0.1%軟膏 5g</h4><div class="soft" style="font-size:.82rem;">1g=1mg → 5g で 薬5mg</div></div>
      <div class="rcard"><h4><span class="e">💉</span>1%リドカイン 5mL</h4><div class="soft" style="font-size:.82rem;">1mL=10mg → 5mL で 薬50mg</div></div>
    </div>
  </section>

  <hr class="hr">

  <!-- G: mg/g two meanings -->
  <section>
    <div class="step-no"><span class="dot">G</span>処方箋の前に</div>
    <h2>「mg」と「g」には、2つの話がある</h2>
    <p class="lead-line">処方箋のmgとgで混乱するのは、実は<b class="k">「mg⇄g」に2種類の意味がある</b>から。ここを分けるだけでスッキリします。</p>
    <div class="whats" style="grid-template-columns:1fr;">
      <div class="wcard">
        <div class="top"><span class="e">①</span>同じ薬の“重さの言いかえ”</div>
        <p class="soft" style="margin:5px 0 7px; font-size:.9rem;">ただ単位を変えただけ。中身はまったく同じ。<b class="kb">1g ＝ 1000mg</b>。「1000円」を「千円札1枚」と呼ぶのと同じこと。</p>
        <div style="font-family:'Zen Maru Gothic';font-weight:900;color:var(--sky-deep);text-align:center;font-size:1.1rem;">1g ⇄ 1000mg　（×1000 / ÷1000）</div>
      </div>
      <div class="wcard">
        <div class="top"><span class="e">②</span>“成分の重さ” と “製剤の重さ”</div>
        <p class="soft" style="margin:5px 0 7px; font-size:.9rem;">これは<b class="k">別もの</b>。薬そのものの重さと、粉やクリーム“ぜんぶ”の重さは違う。2つをつなぐのは <b class="k">濃度（%）</b>。</p>
        <div style="font-family:'Zen Maru Gothic';font-weight:900;color:var(--persimmon-deep);text-align:center;font-size:1.02rem;">例）薬30mg は、10%散だと 0.3g（＝300mg）の粉の中</div>
      </div>
    </div>
    <div class="big-point">処方箋でやる変換は、たいてい<b class="k">②（成分⇄製剤）</b>のほう。<br>だから「÷1000すればいい」じゃなく、<b class="k">濃度を使う</b>のが正解です。</div>
  </section>

  <hr class="hr">

  <!-- H: two-way prescription conversion -->
  <section>
    <div class="step-no"><span class="dot">H</span>電卓の正体 ③</div>
    <h2>処方は「2つの向き」で来る</h2>
    <p class="lead-line">処方箋の量は、来かたが2通り。<b class="k">どっちが来たかで、×か÷かが決まる</b>だけです。</p>

    <div class="panel" style="text-align:center;">
      <div style="background:linear-gradient(180deg,#FFE3CE,#FFD3B3);color:var(--persimmon-deep);font-family:'Zen Maru Gothic';font-weight:900;border-radius:14px;padding:13px;font-size:1.2rem;">製剤（g）・大きい<div style="font-size:.76rem;font-weight:700;color:var(--ink-soft);">処方に「軟膏 ○g」で来る</div></div>
      <div style="padding:9px 0;color:var(--persimmon-deep);font-weight:700;font-size:.92rem;">↓ gで来たら　<b>×濃度</b>　→ 成分mg</div>
      <div style="background:linear-gradient(180deg,#DCEFF6,#C8E6F1);color:var(--sky-deep);font-family:'Zen Maru Gothic';font-weight:900;border-radius:14px;padding:13px;width:64%;margin:0 auto;font-size:1.08rem;">成分（mg）・小さい<div style="font-size:.76rem;font-weight:700;color:var(--ink-soft);">処方に「原薬 ○mg」で来る</div></div>
      <div style="padding:9px 0 0;color:var(--sky-deep);font-weight:700;font-size:.92rem;">↑ mgで来たら　<b>÷濃度</b>　→ 製剤g</div>
    </div>

    <div class="big-point blue"><b class="kb">gで来たら ×濃度</b>（中の成分mgを出す）。<br><b class="kb">mgで来たら ÷濃度</b>（出すべき製剤gを出す）。</div>

    <div class="big-point" style="background:#F3ECF5;border-left-color:var(--plum);">
      💱 <b class="kp">濃度は「g と mg の両替レート」</b><br>
      <span style="font-weight:400">「1g＝○mg」というレート（＝濃度 mg/g）。お金の両替とまったく同じで——<br>
      g → mg は <b class="kp">レートを かける（×）</b>、mg → g は <b class="kp">レートで わる（÷）</b>。<br>
      「円→ドルは×、ドル→円は÷」と同じ向きの話だと思えば、もう迷いません。</span>
    </div>

    <p>下の計算機で、両方の向きを切りかえて試してください。下の「例」ボタンで処方シーンも入ります。</p>

    <h2>もう「×？÷？ ×10？÷10？」で迷わない</h2>

    <div class="step-no"><span class="dot">2</span>希釈の正体</div>

    <p class="lead-line">「薄める（希釈）」＝<b class="kb">水を足して、全体の量を増やすこと</b>。</p>
    <p>このとき大事なのは——<b class="k">中の薬の量は、増えも減りもしません。</b>同じ量の薬が、より広い水の中に散らばるから、<b class="k">1つあたりが薄くなる</b>＝濃度が下がる、というだけ。</p>
    <div class="big-point blue">薬の量は<b class="kb">そのまま</b>。水（全体）が増える → 1つあたりが減る → <b class="kb">濃度が下がる</b>。</div>
  </section>

  <hr class="hr">

  <!-- 3 -->
  <section>
    <div class="step-no"><span class="dot">3</span>動かしてみる</div>
    <h2>○倍に薄めると、どうなる？</h2>
    <p class="lead-line">原液（10%）を、何倍に薄めるか動かしてください。<b class="kb">全体は増え、色（濃さ）は薄く</b>なります。でも<b class="k">薬の量は変わりません</b>。</p>
    <div class="panel">
      <div class="slabels"><span>1倍（原液）</span><span>10倍に薄める</span></div>
      <input type="range" id="dilN" min="1" max="10" value="2" step="1">
      <div class="beaker-wrap">
        <div style="text-align:center;">
          <div class="beaker"><div class="liquid" id="dilLiquid" style="height:30%"></div><div class="drug">💊</div></div>
          <div class="soft" style="font-size:.75rem; margin-top:4px;">全体 <span id="dilVol">2</span> 杯ぶん</div>
        </div>
        <div class="swatchpill">
          <div class="c" id="dilSwatch"></div>
          <div class="t">濃さ</div>
          <div style="font-family:'Zen Maru Gothic'; font-weight:900; color:var(--sky-deep); font-size:1.2rem;"><span id="dilConc">5</span>%</div>
        </div>
      </div>
      <div class="w-steps" id="dilSteps"></div>
    </div>
    <div class="big-point"><b class="k">○倍に薄める</b>＝ 全体を○倍にする ＝ 濃度は <b class="kb">1/○</b> になる。</div>
  </section>

  <hr class="hr">

  <!-- 4 -->
  <section>
    <div class="step-no"><span class="dot">4</span>逆数の関係</div>
    <h2>倍率と濃度は、シーソー</h2>
    <p class="lead-line">全体を増やすほど、濃度は下がる。<b class="kb">全体○倍 ⇄ 濃度 1/○</b>。きれいに逆さまです。</p>
    <table style="width:100%; border-collapse:collapse; border:1px solid var(--line); border-radius:14px; overflow:hidden; box-shadow:var(--shadow);">
      <tr><td style="padding:10px; background:#E7F2F7; font-family:'Zen Maru Gothic'; font-weight:700; color:var(--sky-deep);">薄める倍率</td><td style="padding:10px; text-align:center; font-family:'Zen Maru Gothic'; font-weight:900;">2倍</td><td style="padding:10px; text-align:center; font-family:'Zen Maru Gothic'; font-weight:900;">5倍</td><td style="padding:10px; text-align:center; font-family:'Zen Maru Gothic'; font-weight:900;">10倍</td></tr>
      <tr><td style="padding:10px; background:#FFF3E9; font-family:'Zen Maru Gothic'; font-weight:700; color:var(--persimmon-deep); border-top:1px solid var(--line);">濃度は</td><td style="padding:10px; text-align:center; font-family:'Zen Maru Gothic'; font-weight:900; color:var(--persimmon-deep); border-top:1px solid var(--line);">1/2</td><td style="padding:10px; text-align:center; font-family:'Zen Maru Gothic'; font-weight:900; color:var(--persimmon-deep); border-top:1px solid var(--line);">1/5</td><td style="padding:10px; text-align:center; font-family:'Zen Maru Gothic'; font-weight:900; color:var(--persimmon-deep); border-top:1px solid var(--line);">1/10</td></tr>
    </table>
    <div class="big-point mint" style="margin-top:16px;">だから「<b class="kg">薄めた後の濃度</b>」＝ もとの濃度 <b class="kg">÷ 倍率</b>。<br>例）10%を5倍 → 10 ÷ 5 ＝ <b class="kg">2%</b>。</div>
  </section>

  <hr class="hr">

  <!-- pitfalls -->
  <section>
    <div class="step-no"><span class="dot">5</span>つまずき</div>
    <h2>ここだけ気をつける</h2>
    <div class="pit"><span class="tag">注意①</span><p style="margin:0"><b>「2倍希釈」は“濃く”じゃなく“薄く”。</b><br><span class="soft">2倍に薄める＝全体2倍＝濃度は半分。倍率が上がるほど薄くなる。</span></p></div>
    <div class="pit"><span class="tag">注意②</span><p style="margin:0"><b>薬の量は変わらない。</b><br><span class="soft">水を足しても中身は同じ。変わるのは「全体の量」と「濃度」だけ。</span></p></div>
    <div class="pit"><span class="tag">注意③</span><p style="margin:0"><b>「全体○倍」と「水を○倍足す」は別。</b><br><span class="soft">10倍希釈＝全体を10倍（原液1＋水9）。水を10足すと全体11倍になってしまう。次のページで実際に作ります。</span></p></div>
  </section>

  <div class="jumpwrap">
    <div class="jumphint">薄める＝全体を増やす、はバッチリ。<br>じゃあ、実際に作ってみよう。</div>
    <button class="jumpbtn" onclick="goPage(2)">② 薬剤師の現場で使ってみよう ›</button>
  </div>

</div><!-- /page1 -->
<div id="page2" class="page">

  <header class="hero">
    <span class="eyebrow">現場へ ・ 作る・読む</span>
    <h1>希釈液を<br><span class="hl">作ってみる</span>。</h1>
    <p class="lead">消毒薬の希釈も、粉の倍散も、<br>「原液いくつ＋水いくつ」で全部出せます。</p>
  </header>

  <div class="big-point">合言葉：<b class="k">○倍希釈＝全体を○倍</b>（原液1＋水(○−1)）。<br>薄めた後の濃度＝<b class="kb">もとの濃度 ÷ 倍率</b>。</div>

  <!-- A -->
  <section>
    <div class="step-no"><span class="dot">A</span>持ちこむ</div>
    <h2>現場の希釈たち</h2>
    <div class="perlist">
      <div class="peritem"><span class="emo">🧴</span><span class="txt"><span class="per">消毒薬の希釈</span>（原液を○倍にして使う）</span></div>
      <div class="peritem"><span class="emo">🥄</span><span class="txt"><span class="per">倍散</span>（粉薬を賦形剤で薄めたもの。10倍散など）</span></div>
      <div class="peritem"><span class="emo">🥤</span><span class="txt"><span class="per">シロップの希釈</span>（飲みやすく薄める）</span></div>
    </div>
  </section>

  <hr class="hr">

  <!-- B 希釈レシピ -->
  <section>
    <div class="step-no"><span class="dot">B</span>希釈 ①</div>
    <h2>○倍希釈を作る（原液＋水）</h2>
    <p class="lead-line">「○倍希釈を、ぜんぶで△mL作る」とき。<b class="kb">原液＝全体÷倍率</b>、残りが水です。</p>
    <div class="panel">
      <div class="twoin">
        <div><div class="w-lab">作りたい全体量</div><div class="w-in"><input type="number" id="rxVol" value="100" min="1"><span class="w-unit">mL</span></div></div>
        <div><div class="w-lab">希釈倍率</div><div class="w-in"><input type="number" id="rxN" value="10" min="1" step="1"><span class="w-unit">倍</span></div></div>
      </div>
      <div class="ratiobar"><div class="drugseg" id="rxDrugSeg" style="flex:1">原液</div><div class="waterseg" id="rxWaterSeg" style="flex:9">水</div></div>
      <div class="twoin" style="margin-top:8px;">
        <div class="bigout"><div class="lab">原液</div><div class="v"><span id="rxStock">10</span> mL</div></div>
        <div class="bigout"><div class="lab">水</div><div class="v" style="color:var(--sky-deep)"><span id="rxWater">90</span> mL</div></div>
      </div>
      <div class="w-steps" id="rxSteps"></div>
    </div>
    <p class="soft">例）10倍希釈100mL ＝ 原液10mL ＋ 水90mL。<br>原液1：水9（合わせて全体10）＝ ちゃんと10倍になってます。</p>
  </section>

  <hr class="hr">

  <!-- C 倍散 -->
  <section>
    <div class="step-no"><span class="dot">C</span>希釈 ②（キリの本業）</div>
    <h2>倍散（粉の希釈）</h2>
    <p class="lead-line"><b class="k">○倍散</b>＝ 薬を○倍に薄めた粉。中の薬は <b class="kb">1/○</b>。<br>つまり「<b>薬1：賦形剤(○−1)</b>」で混ぜたもの。</p>
    <p class="soft">使う式：<b>中の薬 ＝ 倍散の量 ÷ 倍率</b>（10倍散なら ÷10）</p>
    <div class="panel">
      <div class="w-lab">どの倍散？</div>
      <div class="seg2" id="bsKind"><button class="on" data-x="10">10倍散</button><button data-x="100">100倍散</button><button data-x="custom">その他</button></div>
      <div class="w-in" id="bsCustomWrap" style="display:none; margin-bottom:8px;"><span class="w-unit">何倍散？</span><input type="number" id="bsCustom" value="20" min="2" step="1"><span class="w-unit">倍散</span></div>
      <div class="w-lab">使う量</div><div class="w-in"><input type="number" id="bsAmt" value="2" min="0" step="0.1"><span class="w-unit">g</span></div>
      <div class="ratiobar" style="margin-top:12px;"><div class="drugseg" id="bsDrugSeg" style="flex:1">薬</div><div class="waterseg" id="bsExSeg" style="flex:9">賦形剤</div></div>
      <div class="bigout" style="margin-top:6px;"><div class="lab">中に入っている薬の量</div><div class="v"><span id="bsRes">200</span> mg</div></div>
      <div class="w-steps" id="bsSteps"></div>
    </div>
  </section>

  <hr class="hr">

  <!-- D 濃度で確かめ -->
  <section>
    <div class="step-no"><span class="dot">D</span>確かめ</div>
    <h2>薄めた後の濃度（÷ 倍率）</h2>
    <p class="lead-line">作った液が結局「何%か」は、<b class="kb">もとの濃度 ÷ 倍率</b>で出ます。パーセントの回とつながります。</p>
    <div class="panel">
      <div class="twoin">
        <div><div class="w-lab">もとの濃度</div><div class="w-in"><input type="number" id="ccC" value="10" min="0" step="0.1"><span class="w-unit">%</span></div></div>
        <div><div class="w-lab">薄める倍率</div><div class="w-in"><input type="number" id="ccN" value="5" min="1" step="1"><span class="w-unit">倍</span></div></div>
      </div>
      <div class="bigout" style="margin-top:8px;"><div class="lab">薄めた後の濃度</div><div class="v" style="color:var(--mint-deep)"><span id="ccRes">2</span> %</div></div>
      <div class="w-steps" id="ccSteps"></div>
    </div>
  </section>

  <hr class="hr">

  <!-- E drill -->
  <section>
    <div class="step-no"><span class="dot" style="background:var(--mint)">練</span>手を動かして覚える</div>
    <h2>希釈ドリル</h2>
    <p class="lead-line">あとは反復。問題を見て、答えを選んでください。</p>
    <div class="quiz">
      <div class="q" id="drillQ"></div>
      <div style="text-align:center;margin:6px 0;font-size:.88rem;color:var(--ink-soft);" id="drillHint"></div>
      <div class="opts" id="drillOpts"></div>
      <div class="fb" id="drillFb"></div>
      <div class="score" id="drillScore">正解 0 / 0</div>
      <button class="next" id="drillNext" style="display:none;">つぎの問題 ›</button>
    </div>
  </section>

  <hr class="hr">

  <!-- F つまずき -->
  <section>
    <div class="step-no"><span class="dot">F</span>現場のつまずき</div>
    <h2>ここで間違えがち</h2>
    <div class="pit"><span class="tag">注意①</span><p style="margin:0"><b>「原液＝全体÷倍率」、水はその残り。</b><br><span class="soft">10倍希釈100mLなら原液10mL＋水90mL。水を100mL足さない。</span></p></div>
    <div class="pit"><span class="tag">注意②</span><p style="margin:0"><b>倍散の数字が大きいほど“薄い”。</b><br><span class="soft">100倍散は10倍散より薄い（中の薬が1/100）。数字が大きい＝薄い。</span></p></div>
    <div class="pit"><span class="tag">注意③</span><p style="margin:0"><b>薄めた後の濃度は「÷倍率」。</b><br><span class="soft">×ではなく÷。倍率を上げるほど濃度は下がる（シーソー）。</span></p></div>
  </section>

  <p class="closing">
    <span class="leaf">🦎</span><br>
    薄める＝<b>全体を増やす</b>。薬の量は同じ。<br>
    ○倍希釈は濃度 <b>1/○</b>、原液は <b>全体÷倍率</b>。<br>
    これで消毒も倍散も、もう怖くありません。
  </p>

</div><!-- /page2 -->

<div id="page1" class="page active">

  <header class="hero">
    <span class="eyebrow">基礎① ・ とことん版</span>
    <h1>1日ぶんを、<br><span class="hl">何回かに分ける</span>。</h1>
    <p class="lead">1日量と1回量。<br>分けるのは ÷、まとめるのは ×。それだけ。</p>
  </header>

  <!-- 1 -->
  <section>
    <div class="step-no"><span class="dot">1</span>2つの量</div>
    <h2>「1日量」と「1回量」</h2>
    <p class="lead-line"><b class="kb">1日量</b>＝その日に飲む合計。<b class="k">1回量</b>＝1回ぶん。この2つを混ぜないことが第一歩。</p>
    <p>例）1日に6mg飲む薬を、1日3回に分けるなら、1回は <b class="k">2mg</b>。<br>「1日ぶんの山」を、回数で等分するだけです。</p>

  <!-- 2 -->
  <section>
    <div class="step-no"><span class="dot">2</span>分ける・まとめる</div>
    <h2>÷で分けて、×でまとめる</h2>
    <p class="lead-line"><b class="kb">1日量 ÷ 回数 ＝ 1回量</b>（分ける）。<br><b class="k">1回量 × 回数 ＝ 1日量</b>（まとめる）。行きと帰りです。</p>
    <div class="panel">

    <div class="big-point">「1回いくつ？」＝<b class="kb">÷</b>。「1日トータルいくつ？」＝<b class="k">×</b>。<br>聞かれてるのがどっちかを、先に決めるのがコツ。</div>

    <div class="perlist">

<div id="page2" class="page">

  <header class="hero">

  <div class="big-point">合言葉：<b class="kb">1日量 ÷ 回数 ＝ 1回量</b>／<b class="k">1回量 × 回数 ＝ 1日量</b>。<br>そして<b class="kg">総量 ＝ 1日量 × 日数</b>。</div>

  <!-- A -->
  <section>
    <div class="step-no"><span class="dot">A</span>持ちこむ</div>
    <h2>処方の2つの書き方</h2>

  </section>

  <!-- B reader -->

    <div class="step-no"><span class="dot">B</span>処方を読む</div>
    <h2>どっちで書かれてても出せる</h2>
    <p class="lead-line">書き方を選んで、数字を入れてください。もう片方の量を計算します。</p>
    <div class="panel">

<template id="tpl-bsa">

  <!-- 1 -->
  <section>
    <div class="step-no"><span class="dot">1</span>BSAってなに</div>
    <h2>体の「表面の広さ」</h2>
    <p class="lead-line"><b class="kb">BSA（体表面積）</b>＝ 体の表面の広さ（単位 m²）。<b class="k">体の大きさを1つの数で表すものさし</b>です。</p>
    <p>体重だけより「体格」をよく表すので、<b class="k">抗がん剤など</b>では「<b class="kb">1m²あたり○mg（mg/m²）</b>」で量を決めます。大人でだいたい <b class="k">1.5〜1.8 m²</b> くらい。</p>
    <div class="big-point blue">BSA ＝ 体格のものさし。投与量は「<b class="kb">mg/m² × BSA</b>」で決める（これも“あたり算”）。</div>
  </section>

  <hr class="hr">

  <!-- 2 -->
  <section>
    <div class="step-no"><span class="dot">2</span>出し方</div>
    <h2>身長と体重から、ルートで出す</h2>
    <p class="lead-line">よく使う<b class="kb">Mosteller（モステラー）式</b>はシンプル：<br><b class="kb">BSA ＝ √(身長cm × 体重kg ÷ 3600)</b>。</p>
    <p>「√（ルート）」は、かけ算の逆で「<b class="k">2回かけたら中身になる数</b>」。電卓の √ ボタン一発です。難しく感じても、やることは「掛けて、3600で割って、ルート」だけ。</p>
    <div class="formula"><div class="big">BSA ＝ √( 身長 × 体重 ÷ 3600 )</div><div class="sub">身長cm・体重kg・3600 は固定の数</div></div>
    <div class="panel">
      <div class="twoin">
        <div><div class="w-lab">身長</div><div class="w-in"><input type="number" id="bsH" value="170" min="0"><span class="w-unit">cm</span></div></div>
        <div><div class="w-lab">体重</div><div class="w-in"><input type="number" id="bsW" value="60" min="0"><span class="w-unit">kg</span></div></div>
      </div>
      <div class="bigout" style="margin-top:8px;"><div class="lab">体表面積 BSA</div><div class="v"><span id="bsRes">1.68</span> <small>m²</small></div></div>
      <div class="w-steps" id="bsSteps"></div>
    </div>
    <p class="soft">※ 式は他にもあります（Du Bois式など）。結果は少しずつ違うので、施設で使う式に合わせます。</p>

    <h2>mg/m² × BSA ＝ 投与量</h2>

    <div class="big-point">例）80mg/m²、BSA 1.68m² なら——<br>80 × 1.68 ＝ <b class="k">134.4mg</b>（1m²あたり80mgを、1.68m²ぶん）。</div>
    <p class="soft">体重あたり（mg/kg）と同じ発想。ものさしが「kg」か「m²」かが違うだけです。</p>

    <div class="pit"><span class="tag">注意②</span><p style="margin:0"><b>最後にルートを忘れない。</b><br><span class="soft">「÷3600」で止めるとBSAにならない。必ず√をとる。</span></p></div>

    <p class="lead-line">腎臓は、血の中の老廃物を尿として外に出す“掃除係”。<b class="kb">多くの薬も、腎臓から外に出ます</b>。</p>
    <p>だから腎臓が弱ると、<b class="kr">薬が体にたまって効きすぎ・副作用</b>につながる。それを防ぐために、<b class="k">腎機能を測って薬の量を加減</b>します。これが腎機能を計算する理由です。</p>

    <p>ここが肝心。腎臓の掃除が<b class="kr">遅い</b>と、Crが外に出きらず<b class="kr">血の中にたまる</b>→<b class="kr">血中Crが高くなる</b>。つまり——<b class="kr">Crが高い＝腎機能が低い</b>。<b>多いほど悪い</b>、という逆の関係です。</p>

  <div style="text-align:center;"><button class="backtop" onclick="goPage(1)">‹ ① 考え方にもどる</button></div>

</div><!-- /page2 -->
</template>
<template id="tpl-auc">
<div id="page1" class="page active">

  <header class="hero">
    <span class="eyebrow">中級③ ・ とことん版</span>
    <h1>体が薬に、<br>どれだけ<span class="hl">さらされた</span>か。</h1>
    <p class="lead">AUC＝血中濃度グラフの「下の面積」。<br>“のべの露出量”を表す数字です。</p>
  </header>

  <!-- 1 -->
  <section>
    <div class="step-no"><span class="dot">1</span>AUCってなに</div>
    <h2>グラフの「下の面積」</h2>
    <p class="lead-line">薬を飲むと、血中濃度は山なりに上がって下がります。その<b class="kb">山の下の面積</b>が <b class="kb">AUC（Area Under the Curve）</b>。</p>
    <p>山の<b class="k">高さ</b>（Cmax）は“その瞬間の濃さ”。でも<b class="kb">面積（AUC）</b>は、<b class="k">時間ぜんぶを足し合わせた“のべの露出量”</b>。体が薬にどれだけさらされたか、の総量です。</p>
    <div class="curvewrap">
      <svg viewBox="0 0 320 175" role="img" aria-label="血中濃度-時間曲線とAUC">
        <line x1="28" y1="148" x2="308" y2="148" stroke="#CBB89B" stroke-width="1.5"/>
        <line x1="28" y1="20" x2="28" y2="148" stroke="#CBB89B" stroke-width="1.5"/>
        <path id="aucArea" d="" fill="rgba(240,138,75,.22)"/>
        <path id="aucLine" d="" fill="none" stroke="#DE6E2F" stroke-width="2.5" stroke-linejoin="round"/>
        <text x="150" y="120" text-anchor="middle" class="axlabel" style="fill:#DE6E2F; font-size:12px;">AUC＝この面積</text>
        <text x="168" y="166" text-anchor="middle" class="axlabel">時間 →</text>
        <text x="14" y="30" text-anchor="middle" class="axlabel" transform="rotate(-90 14 84)">血中濃度</text>
      </svg>
    </div>
    <div class="big-point">Cmax＝山の高さ（瞬間の濃さ）。<b class="kb">AUC＝面積（のべの露出量）</b>。<br>雨にたとえると、Cmaxは“雨の強さ”、AUCは“降った雨の総量”。</div>
  </section>

  <hr class="hr">

  <!-- 2 -->
  <section>
    <div class="step-no"><span class="dot">2</span>核心の式</div>
    <h2>AUC ＝ 投与量 ÷ クリアランス</h2>
    <p class="lead-line">AUCを決めるのは、たった2つ。<b class="kb">入れた量（投与量）</b>と、<b class="kb">出す力（クリアランスCL）</b>。</p>
    <div class="formula"><div class="big">AUC ＝ 投与量 ÷ CL</div><div class="sub">たくさん入れれば面積は増え、よく出す（CL大）ほど面積は減る</div></div>
    <p>つまり <b class="k">投与量 ＝ AUC × CL</b>。狙ったAUC（露出量）にするには、出す力に合わせて量を決める——これが後半のCalvert式につながります。下で動かしてみてください。</p>
    <div class="panel">
      <div class="w-lab">投与量</div>
      <div class="slabels"><span>0mg</span><span>600mg</span></div>
      <input type="range" id="acDose" min="0" max="600" value="300" step="10">
      <div class="w-lab" style="margin-top:6px;">クリアランス（出す力）</div>
      <div class="slabels"><span>1 L/h（弱い）</span><span>20 L/h（強い）</span></div>
      <input type="range" id="acCL" min="1" max="20" value="6" step="0.5">
      <div class="curvewrap">
        <svg viewBox="0 0 320 175">
          <line x1="28" y1="148" x2="308" y2="148" stroke="#CBB89B" stroke-width="1.5"/>
          <line x1="28" y1="20" x2="28" y2="148" stroke="#CBB89B" stroke-width="1.5"/>
          <path id="acArea" d="" fill="rgba(79,163,199,.22)"/>
          <path id="acLine" d="" fill="none" stroke="#367C9C" stroke-width="2.5" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="bigout"><div class="lab">AUC（のべの露出量）</div><div class="v" style="color:var(--sky-deep)"><span id="acRes">50</span><small> mg·h/L</small></div></div>
      <div class="w-steps" id="acSteps"></div>
    </div>
  </section>

  <hr class="hr">

  <!-- 3 -->
  <section>
    <div class="step-no"><span class="dot">3</span>線形なら比例</div>
    <h2>用量2倍 → AUC2倍（ふつうは）</h2>
    <p class="lead-line">出す力（CL）が一定なら、AUCは<b class="kb">投与量に比例</b>します（線形PK）。用量を2倍にすれば、露出量も2倍。</p>
    <p>この「比例」が効くと、<b class="k">添付文書に載っている“ある用量でのAUC”から、別の用量のAUCを予測</b>できます。次ページで実際にやります。</p>
    <div class="big-point blue">線形なら <b class="kb">AUCは用量に比例</b>。だから「100mgでAUC◯」が分かれば「250mgなら ×2.5」で読める。</div>
    <p class="soft">※ ただし飽和する薬（非線形）もあります。用量を上げてもAUCが比例しない場合は別扱い。</p>
  </section>

  <!-- pitfalls -->
  <section>
    <div class="step-no"><span class="dot">4</span>つまずき</div>
    <h2>ここだけ気をつける</h2>
    <div class="pit"><span class="tag">注意①</span><p style="margin:0"><b>Cmax（高さ）とAUC（面積）は別物。</b><br><span class="soft">瞬間の濃さと、のべの露出量。効果・毒性でどちらが効くかは薬による。</span></p></div>
    <div class="pit"><span class="tag">注意②</span><p style="margin:0"><b>AUCが大きい＝出す力が弱い、かも。</b><br><span class="soft">AUC＝量÷CL。同じ量でもCLが小さい（腎機能低下など）とAUCは増える。</span></p></div>
    <div class="pit"><span class="tag">注意③</span><p style="margin:0"><b>単位を確認。</b><br><span class="soft">mg·h/L、μg·h/mL など。Calvertのカルボプラチンは mg·min/mL。混ぜない。</span></p></div>
  </section>

  <div class="jumpwrap">
    <div class="jumphint">AUCの正体「量÷CL」「面積＝露出」はバッチリ。<br>じゃあ、添付文書の数字を使ってみよう。</div>
    <button class="jumpbtn" onclick="goPage(2)">② 薬剤師の現場で使ってみよう ›</button>
  </div>

</div><!-- /page1 -->
<div id="page2" class="page">

  <header class="hero">
    <span class="eyebrow">現場へ ・ 添付文書を読む</span>
    <h1>添付文書の<br><span class="hl">AUC</span>を使う。</h1>
    <p class="lead">載っている数字から、用量予測・相互作用・<br>そしてCalvert式の投与設計まで。</p>
  </header>

  <div class="big-point">合言葉：<b class="kb">AUC＝量÷CL</b>、<b class="kb">量＝AUC×CL</b>。線形なら<b class="k">AUCは用量に比例</b>。</div>

  <!-- A -->
  <section>
    <div class="step-no"><span class="dot">A</span>持ちこむ</div>
    <h2>添付文書のPKパラメータ</h2>
    <p class="lead-line">「薬物動態」の欄に、こんな数字が並びます。AUCはその主役の一つ。</p>
    <div class="insert">
      <div class="ih">○○錠 100mg 単回投与（例・説明用）</div>
      <table>
        <tr><td class="k2">Cmax（最高濃度）</td><td class="v2">2.5 μg/mL</td></tr>
        <tr><td class="k2">Tmax（到達時間）</td><td class="v2">1.5 時間</td></tr>
        <tr><td class="k2">AUC（露出量）</td><td class="v2">20 μg·h/mL</td></tr>
        <tr><td class="k2">t½（半減期）</td><td class="v2">6 時間</td></tr>
        <tr><td class="k2">CL（クリアランス）</td><td class="v2">5 L/h</td></tr>
      </table>
    </div>
    <p class="soft">これらは互いにつながっています（AUC＝量÷CL など）。1つ分かると他も読める。</p>
  </section>

  <hr class="hr">

  <!-- B 比例予測 -->
  <section>
    <div class="step-no"><span class="dot">B</span>使い方①：用量予測</div>
    <h2>記載の用量から、別の用量のAUCを出す</h2>
    <p class="lead-line">添付文書に「<b class="kb">用量A → AUC_A</b>」とあれば、線形なら別の用量Bは <b class="kb">AUC_A × (B ÷ A)</b>。比例そのものです。</p>
    <div class="panel">
      <div class="threein">
        <div><div class="w-lab">記載の用量A</div><div class="w-in"><input type="number" id="ppA" value="100" min="0.1"></div><div class="w-unit" style="font-size:.7rem;">mg</div></div>
        <div><div class="w-lab">そのAUC</div><div class="w-in"><input type="number" id="ppAUC" value="20" min="0"></div><div class="w-unit" style="font-size:.66rem;">μg·h/mL</div></div>
        <div><div class="w-lab">知りたい用量B</div><div class="w-in"><input type="number" id="ppB" value="250" min="0"></div><div class="w-unit" style="font-size:.7rem;">mg</div></div>
      </div>
      <div class="bigout" style="margin-top:8px;"><div class="lab">用量B のときの AUC（予測）</div><div class="v" style="color:var(--sky-deep)"><span id="ppRes">50</span><small> μg·h/mL</small></div></div>
      <div class="w-steps" id="ppSteps"></div>
    </div>
    <p class="soft">※ 線形（用量比例）が前提。非線形の薬では使えません。</p>
  </section>

  <hr class="hr">

  <!-- C 相互作用 -->
  <section>
    <div class="step-no"><span class="dot">C</span>使い方②：相互作用</div>
    <h2>「併用でAUCが○倍」をどう読む？</h2>
    <p class="lead-line">相互作用の欄でよく見る「<b class="kr">AUCが2倍に上昇</b>」。これは<b class="kr">露出量が2倍＝実質、量を2倍飲んだのと同じ</b>ということ。減量や中止の検討サインです。</p>
    <div class="panel">
      <div class="w-lab">併用でAUCが何倍になる？</div>
      <div class="slabels"><span>0.5倍（下がる）</span><span>4倍（上がる）</span></div>
      <input type="range" id="ixN" min="0.5" max="4" value="2" step="0.1">
      <div class="intbars">
        <div class="intbar"><span class="lbl">単独</span><div class="track"><div class="fill" style="width:25%; background:linear-gradient(90deg,var(--sky),var(--sky-deep))"></div></div><span class="v" style="color:var(--sky-deep)">×1</span></div>
        <div class="intbar"><span class="lbl">併用後</span><div class="track"><div class="fill" id="ixFill" style="width:50%; background:linear-gradient(90deg,var(--rose),var(--rose-deep))"></div></div><span class="v" id="ixV" style="color:var(--rose-deep)">×2</span></div>
      </div>
      <div class="w-steps" id="ixSteps"></div>
    </div>
    <div class="big-point rose">「AUCが○倍」＝ <b class="kr">体内の露出が○倍</b>。上がる併用は<b class="kr">効きすぎ・副作用</b>、下がる併用は<b class="kr">効果不足</b>に注意。</div>
  </section>

  <hr class="hr">

  <!-- D 生物学的同等性 -->
  <section>
    <div class="step-no"><span class="dot">D</span>使い方③：同等性</div>
    <h2>ジェネリックの「AUC比」</h2>
    <p class="lead-line">後発品が先発品と“同じように効く”かは、<b class="kb">AUC（とCmax）の比</b>で確認します。比がだいたい <b class="k">0.80〜1.25</b> の範囲に収まれば生物学的に同等とみなす、というのが基本ルール。</p>
    <div class="big-point blue">後発品の AUC が先発品の <b class="kb">80〜125%</b> に入る ＝ 露出量がほぼ同じ ＝ 同等。<br>「面積（のべ露出）がそろっているか」を見ているわけです。</div>
  </section>

  <hr class="hr">

  <!-- E Calvert -->
  <section>
    <div class="step-no"><span class="dot">E</span>使い方④：Calvert式</div>
    <h2>AUCを“目標”にして量を決める</h2>
    <p class="lead-line">カルボプラチンは、<b class="kb">狙うAUCから投与量を逆算</b>します。これが <b class="kb">Calvert（カルバート）式</b>：</p>
    <div class="formula"><div class="big">投与量(mg) ＝ 目標AUC × (GFR + 25)</div><div class="sub">AUCは mg·min/mL、GFRは mL/min。「+25」は腎臓以外の排泄ぶん</div></div>
    <p>正体は <b class="k">量 ＝ AUC × CL</b>（CLのかわりに「GFR+25」を使う）。前テーマの<b class="kb">腎機能（GFR）</b>がそのまま効いてきます。</p>
    <div class="panel">
      <div class="twoin">
        <div><div class="w-lab">目標AUC</div><div class="w-in"><input type="number" id="cvAUC" value="5" min="0" step="0.5"><span class="w-unit" style="font-size:.7rem;">mg·min/mL</span></div></div>
        <div><div class="w-lab">GFR</div><div class="w-in"><input type="number" id="cvGFR" value="60" min="0"><span class="w-unit" style="font-size:.7rem;">mL/min</span></div></div>
      </div>
      <div class="bigout" style="margin-top:8px;"><div class="lab">カルボプラチン 投与量</div><div class="v"><span id="cvRes">425</span><small> mg</small></div></div>
      <div class="w-steps" id="cvSteps"></div>
    </div>
    <div class="note">⚠️ 目標AUC・GFRの推算法・上限（GFRに上限を設けることがある）はレジメン・基準で異なります。実際の投与設計は必ず最新の基準・添付文書・プロトコルで確認してください。</div>
  </section>

  <hr class="hr">

  <!-- F drill -->
  <section>
    <div class="step-no"><span class="dot" style="background:var(--mint)">練</span>手を動かして覚える</div>
    <h2>AUCドリル</h2>
    <p class="lead-line">あとは反復。問題を見て、答えを選んでください。</p>
    <div class="quiz">
      <div class="q" id="drillQ"></div>
      <div style="text-align:center;margin:6px 0;font-size:.88rem;color:var(--ink-soft);" id="drillHint"></div>
      <div class="opts" id="drillOpts"></div>
      <div class="fb" id="drillFb"></div>
      <div class="score" id="drillScore">正解 0 / 0</div>
      <button class="next" id="drillNext" style="display:none;">つぎの問題 ›</button>
    </div>
  </section>

  <hr class="hr">

  <!-- G つまずき -->
  <section>
    <div class="step-no"><span class="dot">G</span>現場のつまずき</div>
    <h2>ここで間違えがち</h2>
    <div class="pit"><span class="tag">注意①</span><p style="margin:0"><b>「AUCが2倍」を軽く見る。</b><br><span class="soft">露出が2倍＝量を倍飲んだのと同じ。減量・中止の検討対象。</span></p></div>
    <div class="pit"><span class="tag">注意②</span><p style="margin:0"><b>Calvertの単位とGFRの扱い。</b><br><span class="soft">AUCはmg·min/mL、GFRはmL/min。GFRに上限を置くレジメンもある。基準を確認。</span></p></div>
    <div class="pit"><span class="tag">注意③</span><p style="margin:0"><b>非線形を線形と思い込む。</b><br><span class="soft">用量比例の予測は線形PKの薬だけ。飽和する薬では成り立たない。</span></p></div>
  </section>

  <p class="closing">
    <span class="leaf">🦎</span><br>
    AUC ＝ <b>面積＝のべの露出量＝量÷CL</b>。<br>
    添付文書では「用量比例で予測」「相互作用×倍」「同等性80〜125%」。<br>
    Calvert ＝ <b>目標AUC×(GFR+25)</b>（量＝AUC×CL の応用）。
  </p>
  <div style="text-align:center;"><button class="backtop" onclick="goPage(1)">‹ ① 考え方にもどる</button></div>

</div><!-- /page2 -->
</template>
<template id="tpl-gamma">
<div id="page1" class="page active">

  <header class="hero">
    <span class="eyebrow">中級④ ・ とことん版</span>
    <h1>体重1kg・1分<br>あたり、<span class="hl">何μg</span>。</h1>
    <p class="lead">それが γ（ガンマ）。<br>持続点滴の速度を表す、ICUの単位です。</p>
  </header>

  <!-- 1 -->
  <section>
    <div class="step-no"><span class="dot">1</span>γってなに</div>
    <h2>1γ ＝ 1μg/kg/min</h2>
    <p class="lead-line"><b class="kb">γ（ガンマ）</b>は、<b class="kb">体重1kg・1分あたり、何μgの薬を流すか</b>という単位。<b class="k">1γ ＝ 1μg/kg/min</b> です。</p>
    <p>主にICU・救急・手術室で、<b class="kb">血圧や心臓を支える薬（カテコラミン：ドパミン・ドブタミン・ノルアドレナリンなど）</b>を、ポンプで“ずっと流し続ける”ときに使います。効果を見ながら細かく増減するので、「体重あたり・分あたり」で表すと便利なんです。</p>
    <div class="big-point blue">γ は「<b class="kb">あたり算が2つ重なった</b>もの」。1kgあたり、かつ1分あたり。だから μg <b>/kg /min</b>。</div>
  </section>

  <hr class="hr">

  <!-- 2 -->
  <section>
    <div class="step-no"><span class="dot">2</span>まず投与量</div>
    <h2>γ × 体重 ＝ 1分あたりのμg</h2>
    <p class="lead-line">「1kgあたり」を「その人の体重ぶん」集めれば、1分あたりの量。<b class="kb">μg/min ＝ γ × 体重kg</b>。ふつうのあたり算です。</p>
    <div class="panel">
      <div class="twoin">
        <div><div class="w-lab">γ（指示）</div><div class="w-in"><input type="number" id="d1G" value="3" min="0" step="0.1"><span class="w-unit">γ</span></div></div>
        <div><div class="w-lab">体重</div><div class="w-in"><input type="number" id="d1W" value="60" min="0"><span class="w-unit">kg</span></div></div>
      </div>
      <div class="bigout" style="margin-top:8px;"><div class="lab">1分あたりの投与量</div><div class="v" style="color:var(--sky-deep)"><span id="d1Res">180</span><small> μg/min</small></div></div>
      <div class="w-steps" id="d1Steps"></div>
    </div>
    <div class="big-point">合言葉：<b class="kb">μg/min ＝ γ × 体重</b>。まずここで「1分に何μg」を出します。</div>
  </section>

  <hr class="hr">

  <!-- 3 -->
  <section>
    <div class="step-no"><span class="dot">3</span>ポンプの速度へ</div>
    <h2>μg/min を mL/時 に直す</h2>
    <p class="lead-line">ポンプにセットするのは <b class="kb">mL/時</b>。だから μg/min を、順番に単位変換します。やることは3つだけ：</p>
    <div class="formula"><div class="big">μg/min ×60（→/時） ÷1000（→mg） ÷濃度（→mL）</div><div class="sub">時間をそろえ、μgをmgにし、濃度で割って体積にする</div></div>
    <div class="panel">
      <div class="threein">
        <div><div class="w-lab">γ</div><div class="w-in"><input type="number" id="d2G" value="3" min="0" step="0.1"></div><div class="w-unit" style="font-size:.7rem;">γ</div></div>
        <div><div class="w-lab">体重</div><div class="w-in"><input type="number" id="d2W" value="60" min="0"></div><div class="w-unit" style="font-size:.7rem;">kg</div></div>
        <div><div class="w-lab">濃度</div><div class="w-in"><input type="number" id="d2C" value="3" min="0.01" step="0.1"></div><div class="w-unit" style="font-size:.7rem;">mg/mL</div></div>
      </div>
      <div class="chain" id="d2Chain"></div>
      <div class="w-steps" id="d2Steps"></div>
    </div>
    <p class="soft">※ 濃度は「注射液1mLに薬が何mg入っているか」。製剤や希釈で変わります。</p>
  </section>

  <!-- pitfalls -->
  <section>
    <div class="step-no"><span class="dot">4</span>つまずき</div>
    <h2>ここだけ気をつける</h2>
    <div class="pit"><span class="tag">注意①</span><p style="margin:0"><b>μg と mg、min と h をそろえる。</b><br><span class="soft">γはμg・min。ポンプはmL・h。×60、÷1000の単位合わせを忘れない。</span></p></div>
    <div class="pit"><span class="tag">注意②</span><p style="margin:0"><b>濃度を必ず確認。</b><br><span class="soft">同じγでも、注射液の濃度が違えばmL/時は変わる。希釈条件をチェック。</span></p></div>

    <div class="step-no"><span class="dot">1</span>CLってなに</div>
    <h2>「血を掃除する力」</h2>
    <p class="lead-line"><b class="kb">クリアランス（CL）</b>＝ <b class="kb">1時間に、何Lの血を“完全に”きれいにできるか</b>（単位 L/h）。体の浄水器の能力です。</p>
    <p>ここがコツ。CLは「<b class="k">抜いた薬の量</b>」ではなく「<b class="k">きれいにした血の量</b>」。同じ浄水器でも、<b class="k">1時間に何Lの水を処理できるか</b>で力を測りますよね。それと同じです。</p>
    <div class="big-point blue">CL ＝ <b class="kb">1時間にきれいにする血の量（L/h）</b>。大きいほど、薬を速く追い出す力が強い。</div>
  </section>

  <hr class="hr">

  <!-- 2 -->
  <section>
    <div class="step-no"><span class="dot">2</span>掃除する水の量</div>
    <h2>大きいCL ＝ 速く抜ける</h2>
    <p class="lead-line">CLが大きいほど、たくさんの血を掃除できる＝薬は<b class="k">速く体から消える</b>（半減期は短め）。CLが小さいと、ゆっくりしか抜けません。</p>
    <div class="panel">
      <div class="w-lab">クリアランス CL（掃除する力）</div>
      <div class="slabels"><span>1 L/h（弱い）</span><span>20 L/h（強い）</span></div>
      <input type="range" id="clRate" min="1" max="20" value="6" step="0.5">
      <div class="cleanwrap">
        <div class="cleanrow"><span class="ic">🧽</span><div class="cleantrack"><div class="cleanfill" id="clFill" style="width:30%"></div></div></div>
        <div class="cleancap">1時間にきれいにする血の量 ＝ <b id="clRateLab">6</b> L/時</div>
      </div>
      <div class="bigout"><div class="lab">抜ける速さのイメージ</div><div class="v" style="color:var(--sky-deep); font-size:1.4rem;"><span id="clSpeed">ふつう</span></div></div>
      <div class="w-steps" id="clSteps"></div>
    </div>
    <div class="big-point">合言葉：<b class="kb">CL大 ＝ 速く抜ける</b>、<b class="k">CL小 ＝ なかなか抜けない</b>。</div>
  </section>

  <hr class="hr">

  <!-- 3 -->
  <section>
    <div class="step-no"><span class="dot">3</span>AUCとの関係</div>
    <h2>掃除が弱いと、露出（AUC）は増える</h2>
    <p class="lead-line">AUCの回を思い出してください。<b class="kb">AUC ＝ 投与量 ÷ CL</b>。掃除する力（CL）が弱いと、同じ量でも体内に<b class="kr">長く・濃く</b>残る＝AUC（露出量）が増えます。</p>
    <div class="formula"><div class="big">CL ＝ 投与量 ÷ AUC</div><div class="sub">添付文書の用量とAUCから、CLを逆算もできる</div></div>
    <div class="big-point blue">CLは「<b class="kb">露出（AUC）を決める蛇口</b>」。CLが半分なら、AUCは2倍に。</div>
  </section>

  <hr class="hr">

  <!-- 4 -->
  <section>
    <div class="step-no"><span class="dot">4</span>掃除係は誰</div>
    <h2>腎臓と肝臓が、手分けして掃除</h2>
    <p class="lead-line">全身のCLは、<b class="kb">腎臓のぶん＋肝臓のぶん（＋その他）</b>の足し算。<b class="kb">全身CL ＝ 腎CL ＋ 肝CL ＋ …</b>。</p>
    <div class="organ">
      <div class="organbox r"><div class="ic">🫘</div><div class="nm">腎クリアランス</div></div>
      <div class="organplus">＋</div>
      <div class="organbox h"><div class="ic">🫀</div><div class="nm">肝クリアランス</div></div>
      <div class="organplus">＋</div>
      <div class="organbox s"><div class="ic">…</div><div class="nm">その他</div></div>
    </div>
    <p>だから<b class="kr">腎機能が落ちると、腎排泄の薬はCLが下がる</b>＝抜けにくくなる。前テーマ『腎機能 Ccr・eGFR』が、ここで効いてきます。</p>
    <div class="big-point rose">腎排泄の薬は、<b class="kr">腎機能↓ → CL↓ → 抜けにくい</b>。だから減量が必要になる。</div>
  </section>

  <!-- pitfalls -->
  <section>
    <div class="step-no"><span class="dot">5</span>つまずき</div>
    <h2>ここだけ気をつける</h2>
    <div class="pit"><span class="tag">注意①</span><p style="margin:0"><b>CLは「薬の量」ではなく「血の量」。</b><br><span class="soft">1時間にきれいにする血のL数。抜いた薬のmgではない。</span></p></div>
    <div class="pit"><span class="tag">注意②</span><p style="margin:0"><b>CLが下がると露出（AUC・濃度）は上がる。</b><br><span class="soft">AUC＝量÷CL。掃除が弱い＝溜まる。</span></p></div>
    <div class="pit"><span class="tag">注意③</span><p style="margin:0"><b>腎・肝の状態でCLは変わる。</b><br><span class="soft">固定値ではない。臓器障害で全身CLが低下する。</span></p></div>
  </section>

  <div class="jumpwrap">
    <div class="jumphint">「掃除する力」「腎・肝で変わる」はバッチリ。<br>じゃあ、添付文書のCLを使ってみよう。</div>
    <button class="jumpbtn" onclick="goPage(2)">② 添付文書の数字を使ってみよう ›</button>
  </div>

</div><!-- /page1 -->
<div id="page2" class="page">

  <header class="hero">
    <span class="eyebrow">現場へ ・ 添付文書のCLを使う</span>
    <h1><span class="hl">CL</span>で、<br>維持量が出せる。</h1>
    <p class="lead">濃度をキープするには毎時何mg？<br>CL × 目標濃度 で出ます。</p>
  </header>

  <div class="big-point">合言葉：<b class="kb">維持投与速度 ＝ CL × 目標濃度(Css)</b>。逆に <b class="k">Css ＝ 投与速度 ÷ CL</b>。</div>

  <!-- A -->
  <section>
    <div class="step-no"><span class="dot">A</span>持ちこむ</div>
    <h2>添付文書のどこを見る？</h2>
    <p class="lead-line">「薬物動態」に <b class="kb">クリアランス CL</b>（L/h や mL/min）が載っています。mL/min なら ÷1000×60 で L/h に直せます。</p>
    <div class="insert">
      <div class="ih">○○注 薬物動態（例・説明用）</div>
      <table>
        <tr><td class="k2 hot">クリアランス CL</td><td class="v2 hot">5 L/h</td></tr>
        <tr><td class="k2">分布容積 Vd</td><td class="v2">42 L</td></tr>
        <tr><td class="k2">t½</td><td class="v2">約5.8 時間</td></tr>
        <tr><td class="k2">主な排泄経路</td><td class="v2">腎（未変化体）</td></tr>
      </table>
    </div>
  </section>

  <hr class="hr">

  <!-- B 維持量 -->
  <section>
    <div class="step-no"><span class="dot">B</span>使い方①：維持投与量</div>
    <h2>濃度をキープする量</h2>
    <p class="lead-line">定常状態で目標濃度を<b class="kb">保つ</b>には、<b class="kb">「抜けていくぶん」を補い続ける</b>。掃除される量＝CL×濃度なので——<b class="kb">維持投与速度 ＝ CL × 目標濃度</b>。</p>
    <div class="formula"><div class="big">維持投与速度 ＝ CL × Css</div><div class="sub">抜けるぶん（CL×濃度）を、入れ続ける</div></div>
    <div class="panel">
      <div class="twoin">
        <div><div class="w-lab">CL</div><div class="w-in"><input type="number" id="mdCL" value="5" min="0" step="0.1"><span class="w-unit">L/h</span></div></div>
        <div><div class="w-lab">目標濃度 Css</div><div class="w-in"><input type="number" id="mdC" value="4" min="0" step="0.1"><span class="w-unit">mg/L</span></div></div>
      </div>
      <div class="twoin" style="margin-top:8px;">
        <div class="bigout"><div class="lab">維持速度</div><div class="v" style="font-size:1.5rem;"><span id="mdRes">20</span><small> mg/h</small></div></div>
        <div class="bigout"><div class="lab">1日量</div><div class="v" style="color:var(--sky-deep); font-size:1.5rem;"><span id="mdDay">480</span><small> mg/日</small></div></div>
      </div>
      <div class="w-steps" id="mdSteps"></div>
    </div>
    <div class="note">⚠️ 経口は吸収率(F)で補正（÷F）。投与間隔ごとの1回量は ×間隔。目標濃度・維持量の設定は治療域・状態・基準で判断（mg/L ≒ μg/mL）。</div>
  </section>

  <hr class="hr">

  <!-- C Css predict -->
  <section>
    <div class="step-no"><span class="dot">C</span>使い方②：定常濃度の予測</div>
    <h2>この速度だと、濃度はいくつ？／CLが落ちたら？</h2>
    <p class="lead-line">逆に、ある投与速度での定常濃度は <b class="kb">Css ＝ 投与速度 ÷ CL</b>。ここで大事：<b class="kr">CLが半分に落ちると、Css は2倍に跳ね上がる</b>（蓄積）。腎・肝障害で要注意です。</p>
    <div class="panel">
      <div class="w-lab">投与速度</div><div class="w-in"><input type="number" id="csRate" value="20" min="0"><span class="w-unit">mg/h</span></div>
